<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            min-height: 100vh;
            padding: 24px;
            padding-top: 200px;
            padding-bottom: 48px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 14px;
            margin: 0;
        }

        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .officer-info {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            line-height: 1.4;
        }

        .status-label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .status-current {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #94a3b8;
        }

        .status-dot.available {
            background: #22c55e;
        }

        .status-dot.unavailable {
            background: #ef4444;
        }

        .status-dot.busy {
            background: #f59e0b;
        }

        .status-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s ease, border-color .15s ease;
        }

        .status-btn:hover {
            background: #f1f5f9;
        }

        .status-btn.active {
            border-color: #2563eb;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 22px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .modal-close {
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
            border-radius: 999px;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .lookup-field {
            margin-bottom: 14px;
        }

        .lookup-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .lookup-field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        .lookup-field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .lookup-submit {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .05s ease, background .15s ease;
        }

        .lookup-submit:hover {
            background: #1d4ed8;
        }

        .lookup-submit:active {
            transform: translateY(1px);
        }

        .lookup-error {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            font-size: 14px;
            display: none;
        }

        .lookup-result {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            font-size: 14px;
            display: none;
            word-break: break-word;
        }

        .report-field {
            margin-bottom: 14px;
        }

        .report-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .report-field input,
        .report-field textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
            font-family: inherit;
            background: #ffffff;
        }

        .report-field input:focus,
        .report-field textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .report-field textarea {
            min-height: 80px;
            resize: vertical;
        }

        .report-submit {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .05s ease, background .15s ease;
        }

        .report-submit:hover {
            background: #1d4ed8;
        }

        .report-submit:active {
            transform: translateY(1px);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #eff6ff;
            border-color: #2563eb;
            color: #1d4ed8;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .record-item {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .record-item strong {
            display: block;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .license-revoke-btn {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: #dc2626;
            background: #ffffff;
            border: 1px solid #dc2626;
            cursor: pointer;
            margin-left: 8px;
        }

        .license-revoke-btn:hover {
            background: #fef2f2;
        }

        .license-revoked-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: #991b1b;
            background: #fef2f2;
            border: 1px solid #fecaca;
            margin-left: 8px;
        }

        .record-item span {
            color: #475569;
            font-size: 13px;
        }

        .record-text {
            flex: 1;
            min-width: 0;
        }

        .record-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .record-action-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .record-action-btn:hover {
            background: #f1f5f9;
        }

        .record-action-btn.citation {
            background: #fef9c3;
            border-color: #fde68a;
            color: #854d0e;
        }

        .record-action-btn.arrest {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .record-delete-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .record-delete-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .modal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .modal-tab {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-tab.active {
            background: #eff6ff;
            border-color: #2563eb;
            color: #1d4ed8;
        }

        .modal-tab-panel {
            display: none;
        }

        .modal-tab-panel.active {
            display: block;
        }


        .plate-lookup-btn {
            position: fixed;
            right: 24px;
            bottom: 24px;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #2563eb;
            background: #ffffff;
            color: #2563eb;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            z-index: 700;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .plate-lookup-btn:hover {
            background: #eff6ff;
        }

        .civilian-lookup-btn {
            position: fixed;
            right: 180px;
            bottom: 24px;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #2563eb;
            background: #ffffff;
            color: #2563eb;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            z-index: 700;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .civilian-lookup-btn:hover {
            background: #eff6ff;
        }

        .status-select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }

        .status-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-current">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Available</span>
        </div>
        <div class="status-buttons">
            <select id="statusSelect" class="status-select">
                <option value="available">Available</option>
                <option value="unavailable">Unavailable</option>
                <option value="busy">Busy</option>
            </select>
        </div>
    </div>


    <button class="back-btn" id="backBtn">← Back</button>

    <button type="button" class="plate-lookup-btn" id="plateLookupBtn">Plate Lookup</button>
    <button type="button" class="civilian-lookup-btn" id="civilianLookupBtn">Lookup Civilian</button>

    <div class="modal-overlay" id="lookupModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Lookup</div>
                <button class="modal-close" id="lookupModalClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="modal-tabs">
                <button type="button" class="modal-tab active" data-tab="plate" data-target="lookupPlatePanel">Plate</button>
                <button type="button" class="modal-tab" data-tab="civilian" data-target="lookupCivilianPanel">Civilian</button>
            </div>
            <div class="modal-tab-panel active" id="lookupPlatePanel">
                <div class="lookup-field">
                    <label for="plateInput">Plate number</label>
                    <input type="text" id="plateInput" placeholder="e.g. ABC 123" />
                </div>
                <button type="button" class="lookup-submit" id="plateSubmitBtn">Search</button>
                <div class="lookup-error" id="plateError"></div>
                <div class="lookup-result" id="plateResult"></div>
            </div>
            <div class="modal-tab-panel" id="lookupCivilianPanel">
                <div class="lookup-field">
                    <label for="civilianInput">Name or ID</label>
                    <input type="text" id="civilianInput" placeholder="e.g. John Doe" />
                </div>
                <button type="button" class="lookup-submit" id="civilianSubmitBtn">Search</button>
                <div class="lookup-error" id="civilianError"></div>
                <div class="lookup-result" id="civilianResult"></div>
                <div id="civilianDetails" style="display:none; margin-top:14px;">
                    <div class="tabs">
                        <button type="button" class="tab-btn active" data-tab="details" data-target="civilianDetailsPanel">Details</button>
                        <button type="button" class="tab-btn" data-tab="records" data-target="civilianRecordsPanel">Records</button>
                    </div>
                    <div class="tab-panel active" id="civilianDetailsPanel">
                        <div class="record-item" id="selectedCivilianInfo"></div>
                        <div class="record-actions">
                            <button type="button" class="record-action-btn" id="openTrafficStopBtn">Traffic Stop</button>
                            <button type="button" class="record-action-btn citation" id="openCitationBtn">Citation</button>
                            <button type="button" class="record-action-btn arrest" id="openArrestBtn">Arrest</button>
                        </div>
                    </div>
                    <div class="tab-panel" id="civilianRecordsPanel">
                        <div id="civilianRecordsList"><div class="empty">Loading records...</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="trafficStopModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Traffic Stop Report</div>
                <button class="modal-close" id="trafficStopModalClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="report-field">
                <label for="tsCivilianId">Civilian ID</label>
                <input type="text" id="tsCivilianId" readonly />
            </div>
            <div class="report-field">
                <label for="tsCivilianName">Civilian Name</label>
                <input type="text" id="tsCivilianName" readonly />
            </div>
            <div class="report-field">
                <label for="tsReason">Reason for Stop</label>
                <input type="text" id="tsReason" placeholder="e.g. Speeding" />
            </div>
            <div class="report-field">
                <label for="tsLocation">Location</label>
                <input type="text" id="tsLocation" placeholder="e.g. Highway 1" />
            </div>
            <div class="report-field">
                <label for="tsNotes">Notes</label>
                <textarea id="tsNotes" placeholder="Any details..."></textarea>
            </div>
            <button type="button" class="report-submit" id="tsSubmitBtn">Submit Report</button>
            <button type="button" class="report-submit" id="tsDownloadPdfBtn" style="background:#334155;">Download PDF</button>
            <div class="lookup-error" id="tsError"></div>
            <div class="lookup-result" id="tsSuccess"></div>
        </div>
    </div>

    <div class="modal-overlay" id="citationModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Issue Citation</div>
                <button class="modal-close" id="citationModalClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="report-field">
                <label for="citationCivilianId">Civilian ID</label>
                <input type="text" id="citationCivilianId" readonly />
            </div>
            <div class="report-field">
                <label for="citationCivilianName">Civilian Name</label>
                <input type="text" id="citationCivilianName" readonly />
            </div>
            <div class="report-field">
                <label for="citationReason">Violation</label>
                <input type="text" id="citationReason" placeholder="e.g. Speeding, Parking violation" />
            </div>
            <div class="report-field">
                <label for="citationLocation">Location</label>
                <input type="text" id="citationLocation" placeholder="e.g. Highway 1" />
            </div>
            <div class="report-field">
                <label for="citationNotes">Notes</label>
                <textarea id="citationNotes" placeholder="Any details..."></textarea>
            </div>
            <button type="button" class="report-submit" id="citationSubmitBtn">Issue Citation</button>
            <button type="button" class="report-submit" id="citationDownloadPdfBtn" style="background:#334155;">Download PDF</button>
            <div class="lookup-error" id="citationError"></div>
            <div class="lookup-result" id="citationSuccess"></div>
        </div>
    </div>

    <div class="modal-overlay" id="arrestModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Make Arrest</div>
                <button class="modal-close" id="arrestModalClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="report-field">
                <label for="arrestCivilianId">Civilian ID</label>
                <input type="text" id="arrestCivilianId" readonly />
            </div>
            <div class="report-field">
                <label for="arrestCivilianName">Civilian Name</label>
                <input type="text" id="arrestCivilianName" readonly />
            </div>
            <div class="report-field">
                <label for="arrestCharges">Charges</label>
                <input type="text" id="arrestCharges" placeholder="e.g. Grand Theft Auto" />
            </div>
            <div class="report-field">
                <label for="arrestLocation">Location</label>
                <input type="text" id="arrestLocation" placeholder="e.g. Downtown" />
            </div>
            <div class="report-field">
                <label for="arrestNotes">Notes</label>
                <textarea id="arrestNotes" placeholder="Any details..."></textarea>
            </div>
            <button type="button" class="report-submit" id="arrestSubmitBtn">Make Arrest</button>
            <button type="button" class="report-submit" id="arrestDownloadPdfBtn" style="background:#334155;">Download PDF</button>
            <div class="lookup-error" id="arrestError"></div>
            <div class="lookup-result" id="arrestSuccess"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        let localSupabase = null;
        try {
            if (typeof window.supabase !== "undefined") {
                localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (err) {
            console.error("Supabase init failed:", err);
        }

        document.getElementById("backBtn").addEventListener("click", () => window.close());

        let officerId = "officer-" + Math.random().toString(36).slice(2, 10);
        try {
            const stored = localStorage.getItem("policeOfficerId");
            if (stored) officerId = stored;
            else localStorage.setItem("policeOfficerId", officerId);
        } catch (err) {
            console.error("Could not read officer id:", err);
        }

        let officerName = "Officer";
        let officerRank = "";

        (function loadOfficerDetails() {
            const officerInfo = document.getElementById("officerInfo");
            const params = new URLSearchParams(window.location.search);
            const pName = params.get("name");
            const pRank = params.get("rank");
            if (pName) {
                officerName = pName;
                officerRank = pRank || "";
                try {
                    localStorage.setItem("policeOfficerName", officerName);
                    localStorage.setItem("policeOfficerRank", officerRank);
                } catch (err) {
                    console.error("Could not save officer details:", err);
                }
            } else {
                try {
                    officerName = localStorage.getItem("policeOfficerName") || "Officer";
                    officerRank = localStorage.getItem("policeOfficerRank") || "";
                } catch (err) {
                    console.error("Could not read officer details:", err);
                }
            }
            if (officerInfo) {
                const display = (officerRank ? officerRank + " " : "") + officerName;
                officerInfo.innerHTML = display;
            }
        })();

        const STATUS_LABELS = {
            available: "Available",
            unavailable: "Unavailable",
            busy: "Busy"
        };

        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const statusSelect = document.getElementById("statusSelect");

        let currentStatus = "available";

        function getCurrentStatus() {
            return currentStatus;
        }

        function setStatus(status) {
            if (!STATUS_LABELS[status]) status = "available";
            currentStatus = status;
            if (statusText) statusText.textContent = STATUS_LABELS[status];
            if (statusDot) {
                statusDot.className = "status-dot " + status;
            }
            if (statusSelect) {
                statusSelect.value = status;
            }
            try {
                localStorage.setItem("policeStatus", status);
            } catch (err) {
                console.error("Could not save status:", err);
            }
        }

        if (statusSelect) {
            statusSelect.addEventListener("change", () => {
                setStatus(statusSelect.value);
            });
        }

        let savedStatus = "available";
        try {
            savedStatus = localStorage.getItem("policeStatus") || "available";
        } catch (err) {
            console.error("Could not read status:", err);
        }
        setStatus(savedStatus);

        const lookupModal = document.getElementById("lookupModal");
        const lookupModalClose = document.getElementById("lookupModalClose");
        const plateInput = document.getElementById("plateInput");
        const plateSubmitBtn = document.getElementById("plateSubmitBtn");
        const plateError = document.getElementById("plateError");
        const plateResult = document.getElementById("plateResult");
        const civilianInput = document.getElementById("civilianInput");
        const civilianSubmitBtn = document.getElementById("civilianSubmitBtn");
        const civilianError = document.getElementById("civilianError");

        async function loadCivilianRecords(civilianId) {
            if (!civilianRecordsList || !localSupabase) return;
            civilianRecordsList.innerHTML = '<div class="empty">Loading records...</div>';
            try {
                const [stopsRes, citationsRes, arrestsRes] = await Promise.all([
                    localSupabase.from('traffic_stops').select('*').eq('civilian_id', civilianId).order('created_at', { ascending: false }),
                    localSupabase.from('citations').select('*').eq('civilian_id', civilianId).order('created_at', { ascending: false }),
                    localSupabase.from('arrests').select('*').eq('civilian_id', civilianId).order('created_at', { ascending: false })
                ]);

                const records = [];
                (stopsRes.data || []).forEach((row) => records.push({ table: 'traffic_stops', type: 'Traffic Stop', row }));
                (citationsRes.data || []).forEach((row) => records.push({ table: 'citations', type: 'Citation', row }));
                (arrestsRes.data || []).forEach((row) => records.push({ table: 'arrests', type: 'Arrest', row }));

                if (records.length === 0) {
                    civilianRecordsList.innerHTML = '<div class="empty">No records found.</div>';
                    return;
                }

                civilianRecordsList.innerHTML = records.map((record) => {
                    const date = record.row.created_at ? new Date(record.row.created_at).toLocaleString() : '';
                    const details = [record.row.reason, record.row.charges, record.row.location, record.row.notes].filter(Boolean).join(' | ');
                    return `<div class="record-item">
                        <div class="record-text">
                            <strong>${record.type} - ${date}</strong>
                            <span>${details || 'No details'}</span>
                        </div>
                        <button type="button" class="record-delete-btn" data-table="${record.table}" data-id="${record.row.id}" title="Delete record">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>`;
                }).join('');

                civilianRecordsList.querySelectorAll('.record-delete-btn').forEach((btn) => {
                    btn.addEventListener('click', async (e) => {
                        const table = btn.getAttribute('data-table');
                        const id = btn.getAttribute('data-id');
                        if (!confirm('Delete this record?')) return;
                        try {
                            const { error } = await localSupabase.from(table).delete().eq('id', id);
                            if (error) {
                                alert('Failed to delete: ' + error.message);
                                return;
                            }
                            loadCivilianRecords(civilianId);
                        } catch (err) {
                            alert('Failed to delete record.');
                            console.error(err);
                        }
                    });
                });
            } catch (err) {
                civilianRecordsList.innerHTML = '<div class="empty">Failed to load records.</div>';
                console.error(err);
            }

        async function generateTrafficStopPdf() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(20);
                doc.setFont(undefined, "bold");
                doc.text("Traffic Stop Report", 14, 16);
                doc.setFont(undefined, "normal");
                doc.setFontSize(11);
                doc.text("PulseCAD Police Records", 14, 22);
                doc.setLineWidth(0.3);
                doc.line(14, 24, 196, 24);

                const fields = [
                    ["Officer", (officerRank ? officerRank + " " : "") + officerName],
                    ["Date", new Date().toLocaleString()],
                    ["Civilian ID", getText("tsCivilianId")],
                    ["Civilian Name", getText("tsCivilianName")],
                    ["Reason for Stop", getText("tsReason")],
                    ["Location", getText("tsLocation")],
                    ["Notes", getText("tsNotes")]
                ];

                let y = 30;
                const lineHeight = 7;
                const labelX = 14;
                const fieldX = 60;

                fields.forEach(([label, value], index) => {
                    if (y > 280) {
                        doc.addPage();
                        y = 20;
                    }
                    doc.setFont(undefined, "bold");
                    doc.text(label + ":", labelX, y);
                    doc.setFont(undefined, "normal");
                    const lines = doc.splitTextToSize(value || "", 120);
                    doc.text(lines, fieldX, y);
                    y += Math.max(lineHeight, lines.length * lineHeight);
                    if (index < fields.length - 1) {
                        doc.setDrawColor(220, 220, 220);
                        doc.line(labelX, y + 1, 196, y + 1);
                        y += 4;
                    }
                });

                doc.save("traffic-stop-" + Date.now() + ".pdf");
            } catch (err) {
                alert("Failed to generate PDF.");
                console.error(err);
            }
        }

                    }
                });

                doc.save("citation-" + Date.now() + ".pdf");
            } catch (err) {
                alert("Failed to generate PDF.");
                console.error(err);
            }
        }

        async function generateArrestPdf() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(20);
                doc.setFont(undefined, "bold");
                doc.text("Arrest Report", 14, 16);
                doc.setFont(undefined, "normal");
                doc.setFontSize(11);
                doc.text("PulseCAD Police Records", 14, 22);
                doc.setLineWidth(0.3);
                doc.line(14, 24, 196, 24);

                const fields = [
                    ["Officer", (officerRank ? officerRank + " " : "") + officerName],
                    ["Date", new Date().toLocaleString()],
                    ["Civilian ID", getText("arrestCivilianId")],
                    ["Civilian Name", getText("arrestCivilianName")],
                    ["Charges", getText("arrestCharges")],
                    ["Location", getText("arrestLocation")],
                    ["Notes", getText("arrestNotes")]
                ];

                let y = 30;
                const lineHeight = 7;
                const labelX = 14;
                const fieldX = 60;

                fields.forEach(([label, value], index) => {
                    if (y > 280) {
                        doc.addPage();
                        y = 20;
                    }
                    doc.setFont(undefined, "bold");
                    doc.text(label + ":", labelX, y);
                    doc.setFont(undefined, "normal");
                    const lines = doc.splitTextToSize(value || "", 120);
                    doc.text(lines, fieldX, y);
                    y += Math.max(lineHeight, lines.length * lineHeight);
                    if (index < fields.length - 1) {
                        doc.setDrawColor(220, 220, 240);
                        doc.line(labelX, y + 1, 196, y + 1);
                        y += 4;
                    }
                });

                doc.save("arrest-" + Date.now() + ".pdf");
            } catch (err) {
                alert("Failed to generate PDF.");
                console.error(err);
            }
        }

        const tsDownloadPdfBtn = document.getElementById("tsDownloadPdfBtn");
        if (tsDownloadPdfBtn) {
            tsDownloadPdfBtn.addEventListener("click", generateTrafficStopPdf);
        }

        const citationDownloadPdfBtn = document.getElementById("citationDownloadPdfBtn");
        if (citationDownloadPdfBtn) {
            citationDownloadPdfBtn.addEventListener("click", generateCitationPdf);
        }

        const arrestDownloadPdfBtn = document.getElementById("arrestDownloadPdfBtn");
        if (arrestDownloadPdfBtn) {
            arrestDownloadPdfBtn.addEventListener("click", generateArrestPdf);
        }
    </script>
