<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mod Panel - PulseCAD</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }
        .topbar-title { font-size: 18px; font-weight: 800; }
        .back-btn {
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 24px; }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { margin: 0 0 4px; font-size: 20px; }
        .card h3 { margin: 0 0 12px; font-size: 16px; }
        .meta { font-size: 13px; color: #64748b; }
        .field { margin-top: 6px; }
        .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .erlc-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }
        .send-btn {
            margin-top: 12px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.6; cursor: default; }
        .status { font-size: 13px; margin-top: 10px; color: #64748b; }
        .status.error { color: #dc2626; font-weight: 700; }
        .status.ok { color: #16a34a; font-weight: 700; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-title">Mod Panel</div>
        <button class="back-btn" id="backBtn">← Back</button>
    </div>
    <div class="container" id="container">
        <div class="card">
            <h2 id="communityName">Loading community...</h2>
            <div class="meta" id="communityMeta"></div>
        </div>
        <div class="card">
            <h3>ER:LC Server Messages</h3>
            <div id="erlcStatus" class="status"></div>
            <div id="erlcSender" class="hidden">
                <div class="field">
                    <label for="erlcMsgInput">Send a :m message to the server</label>
                    <input type="text" id="erlcMsgInput" class="erlc-input" placeholder="Type your message..." />
                </div>
                <button type="button" class="send-btn" id="erlcSendBtn">Send :m</button>
            </div>
            <div id="erlcNote" class="status hidden">
                No ERLC API key set. Add it in the community dashboard (General &rarr; ERLC API Key) to send server messages.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const params = new URLSearchParams(window.location.search);
        const communityId = params.get("id");

        const communityNameEl = document.getElementById("communityName");
        const communityMetaEl = document.getElementById("communityMeta");
        const erlcStatusEl = document.getElementById("erlcStatus");
        const erlcSenderEl = document.getElementById("erlcSender");
        const erlcNoteEl = document.getElementById("erlcNote");
        const erlcMsgInput = document.getElementById("erlcMsgInput");
        const erlcSendBtn = document.getElementById("erlcSendBtn");

        document.getElementById("backBtn").addEventListener("click", () => window.close());

        let erlcApiKey = "";

        function setStatus(text, kind) {
            if (!erlcStatusEl) return;
            erlcStatusEl.textContent = text || "";
            erlcStatusEl.className = "status" + (kind ? " " + kind : "");
        }

        async function loadCommunity() {
            if (!communityId) {
                communityNameEl.textContent = "No community specified.";
                return;
            }
            try {
                const { data, error } = await localSupabase
                    .from("communities")
                    .select("*")
                    .eq("id", communityId)
                    .maybeSingle();
                if (error) {
                    communityNameEl.textContent = "Failed to load community.";
                    return;
                }
                if (!data) {
                    communityNameEl.textContent = "Community not found.";
                    return;
                }
                communityNameEl.textContent = data.name || "Community";
                communityMetaEl.textContent = data.description || "";

                erlcApiKey = data.erlc_api_key || "";
                if (!erlcApiKey) {
                    try { erlcApiKey = localStorage.getItem("erlcApiKey_" + communityId) || ""; } catch (e) {}
                }

                if (erlcApiKey) {
                    if (erlcSenderEl) erlcSenderEl.classList.remove("hidden");
                    if (erlcNoteEl) erlcNoteEl.classList.add("hidden");
                    setStatus("ERLC API key loaded. You can send :m messages.", "ok");
                } else {
                    if (erlcSenderEl) erlcSenderEl.classList.add("hidden");
                    if (erlcNoteEl) erlcNoteEl.classList.remove("hidden");
                    setStatus("");
                }
            } catch (err) {
                communityNameEl.textContent = "An unexpected error occurred.";
                console.error(err);
            }
        }

        async function sendErkMessage(message) {
            const res = await fetch("/api/erlc/v2/server/command", {
                method: "POST",
                headers: {
                    "server-key": erlcApiKey,
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({ command: ":m " + message })
            });
            const text = await res.text().catch(() => "");
            if (!res.ok) {
                let detail = "HTTP " + res.status + (text ? " " + text : "");
                try {
                    const j = JSON.parse(text);
                    if (j && j.debug) {
                        detail = "HTTP " + (j.erlcStatus || res.status) +
                            " | method=" + j.debug.method +
                            " | target=" + j.debug.target +
                            " | bodyLen=" + j.debug.bodyLength +
                            " | keySent=" + j.debug.hasServerKey +
                            " | erlcSays=" + (j.erlcBody || "(empty)");
                    }
                } catch (e) {}
                throw new Error(detail);
            }
            try { return JSON.parse(text); } catch (e) { return {}; }
        }

        if (erlcSendBtn) {
            erlcSendBtn.addEventListener("click", async () => {
                const message = erlcMsgInput ? erlcMsgInput.value.trim() : "";
                if (!message) {
                    setStatus("Type a message first.", "error");
                    return;
                }
                if (!erlcApiKey) {
                    setStatus("No ERLC API key set.", "error");
                    return;
                }
                erlcSendBtn.disabled = true;
                erlcSendBtn.textContent = "Sending...";
                try {
                    const result = await sendErkMessage(message);
                    setStatus((result && result.message) ? (result.message) : "Message sent.", "ok");
                    if (erlcMsgInput) erlcMsgInput.value = "";
                } catch (err) {
                    setStatus("Failed to send: " + err.message + " — check API key / browser CORS", "error");
                    console.error("ERLC command failed:", err);
                } finally {
                    erlcSendBtn.disabled = false;
                    erlcSendBtn.textContent = "Send :m";
                }
            });
        }

        erlcMsgInput && erlcMsgInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                erlcSendBtn && erlcSendBtn.click();
            }
        });

        loadCommunity();
    </script>
</body>
</html>
