<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Community - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            padding: 40px 24px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .community-name {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .community-meta {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-verified {
            color: #ffffff;
            background: #2563eb;
            border: 1px solid #2563eb;
        }

        .badge-suspended {
            color: #ffffff;
            background: #dc2626;
            border: 1px solid #dc2626;
        }

        .badge-joined {
            color: #166534;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }

        .community-description {
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        .community-screen {
            margin-top: 24px;
            min-height: 280px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .role-btn {
            width: 220px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .role-btn:hover {
            background: #f1f5f9;
        }

        .suspended-note {
            color: #dc2626;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .empty {
            color: #64748b;
            font-size: 14px;
            padding: 20px 0;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 22px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 14px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        .field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .05s ease, background .15s ease;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

                                    .from("user_communities")
                                    .select("user_id")

                                if (memberError) throw memberError;

                                const rows = Array.isArray(memberRows) ? memberRows : [];
                                const ids = rows.map((r) => r.user_id).filter(Boolean);
                                let emailById = {};
                                if (ids.length > 0) {
                                    const { data: users, error: userError } = await localSupabase
                                        .from("users")
                                        .select("id, email")
                                        .in("id", ids);
                                    if (userError) throw userError;
                                    (users || []).forEach((u) => { emailById[u.id] = u.email; });
                                }

                                const esc = (t) => (t || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                                if (community && community.creator_email) {

                                } else {
                                    html += rows.map((r) => `<button type="button" class="member-btn">${esc(emailById[r.user_id] || r.user_id)}</button>`).join('');
                                }

                        async function addDepartment(name, passcode, banner) {
                            if (!name || !localSupabase) return;
                            try {
                                const { count, error: countError } = await localSupabase
                                    .from("departments")
                                    .select("*", { count: "exact", head: true })
                                    .eq("community_id", id);
                                if (!countError && typeof count === "number" && count >= 5) {
                                    alert("This community already has the maximum of 5 departments.");
                                    return;
                                }
                                const payload = { community_id: id, name: name.trim() };
                                if (passcode && passcode.trim()) payload.passcode = passcode.trim();
                                if (banner) payload.banner = banner;
                                await localSupabase
                                    .from("departments")
                                    .insert([payload]);
                                loadDepartments();
                            } catch (err) {
                                alert("Failed to add department.");
                            }
                        }

                        async function editDepartment(department) {
                            if (!department || !localSupabase) return;
                            const editModal = document.getElementById("editDepartmentModal");
                            const editDeptName = document.getElementById("editDeptName");
                            const editDeptPasscode = document.getElementById("editDeptPasscode");
                            const editDeptBanner = document.getElementById("editDeptBanner");
                            const editDeptBannerPreview = document.getElementById("editDeptBannerPreview");
                            const editDeptSubmitBtn = document.getElementById("editDeptSubmitBtn");
                            const editDeptError = document.getElementById("editDeptError");
                            const editDeptModalClose = document.getElementById("editDeptModalClose");
                            
                            if (!editModal) return;
                            
                            let currentBanner = department.banner || null;
                            
                            if (editDeptName) editDeptName.value = department.name || "";
                            if (editDeptPasscode) editDeptPasscode.value = department.passcode || "";
                            if (editDeptBannerPreview) {
                                if (currentBanner) {
                                    editDeptBannerPreview.src = currentBanner;
                                    editDeptBannerPreview.style.display = "block";
                                } else {
                                    editDeptBannerPreview.style.display = "none";
                                }
                            }
                            if (editDeptError) { editDeptError.textContent = ""; editDeptError.style.display = "none"; }
                            
                            editModal.classList.add("open");
                            
                            const handleEditDeptBannerChange = (e) => {
                                const file = e.target.files[0];
                                if (!file) return;
                                if (!file.type.startsWith("image/")) {
                                    if (editDeptError) { editDeptError.textContent = "Please select an image file."; editDeptError.style.display = "block"; }
                                    return;
                                }
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    currentBanner = ev.target.result;
                                    if (editDeptBannerPreview) {
                                        editDeptBannerPreview.src = currentBanner;
                                        editDeptBannerPreview.style.display = "block";
                                    }
                                };
                                reader.readAsDataURL(file);
                            };
                            
                            if (editDeptBanner) {
                                editDeptBanner.onchange = handleEditDeptBannerChange;
                            }
                            
                            const handleEditDeptSubmit = async () => {
                                const newName = editDeptName ? editDeptName.value.trim() : "";
                                const newPasscode = editDeptPasscode ? editDeptPasscode.value.trim() : "";
                                
                                if (!newName) {
                                    if (editDeptError) { editDeptError.textContent = "Department name is required."; editDeptError.style.display = "block"; }
                                    return;
                                }
                                
                                try {
                                    const payload = { name: newName };
                                    if (newPasscode) payload.passcode = newPasscode;
                                    else payload.passcode = null;
                                    if (currentBanner !== null) payload.banner = currentBanner;
                                    
                                    console.log("Saving department:", payload);
                                    
                                    const { data: updated, error } = await localSupabase
                                        .from("departments")
                                        .update(payload)
                                        .eq("id", department.id)
                                        .select();
                                    if (error) throw error;
                                    if (!updated || updated.length === 0) {
                                        throw new Error("Update saved 0 rows. This is a database permissions (RLS) issue on the departments table \u2014 enable UPDATE for authenticated users.");
                                    }
                                    
                                    editModal.classList.remove("open");
                                    loadDepartments();
                                } catch (err) {
                                    console.error("Failed to update department:", err);
                                    if (editDeptError) { editDeptError.textContent = "Failed to save: " + (err.message || err); editDeptError.style.display = "block"; }
                                }
                            };
                            
                            if (editDeptSubmitBtn) {
                                editDeptSubmitBtn.onclick = handleEditDeptSubmit;
                            }
                        }

                        async function discordApi(route, body) {
                            const endpoints = ["/api/discord-" + route, "https://www.pulsecad.xyz/api/discord-" + route];
                            for (const ep of endpoints) {
                                try {
                                    const r = await fetch(ep, {
                                        method: "POST",
                                        headers: { "Content-Type": "application/json" },
                                        body: JSON.stringify(body)
                                    });
                                    const data = await r.json();
                                    if (r.ok) return data;
                                    if (data && data.error) throw new Error(data.error);
                                    throw new Error("Request failed");
                                } catch (err) {
                                    if (ep === endpoints[endpoints.length - 1]) throw err;
                                }
                            }
                        }

                                if (discordChannelStatus) discordChannelStatus.textContent = "Loading servers...";
                                try {
                                    const data = await discordApi("guilds", { token });
                                    const guilds = data.guilds || [];
                                    if (guilds.length === 0) {
                                        if (discordChannelStatus) discordChannelStatus.textContent = "No servers found for this bot.";
                                        return;
                                    }
                                    discordGuildSelect.innerHTML = guilds.map((g) => `<option value="${g.id}">${g.name.replace(/</g, '&lt;')}</option>`).join('');
                                    discordGuildSelectWrap.style.display = "block";

                                    if (discordChannelStatus) discordChannelStatus.textContent = "Select a server and fetch channels.";

                                try {

                                    if (pcBox.classList.contains("open") && pcInput) {
                                        if (pcError) pcError.style.display = "none";
                                        pcInput.focus();
                                    }
                                });
                            });
                        });
                }

                contentEl.querySelectorAll(".role-btn[data-role='Civilian']").forEach((btn) => {
                    btn.addEventListener("click", () => {
                        window.open("/civilian.html", "_blank");
                    });
                });
            } catch (err) {
                contentEl.innerHTML = `<div class="empty">An unexpected error occurred: ${err?.message || err}</div>`;
                console.error("loadCommunity failed:", err);
            }
        }

        const policeModal = document.getElementById("policeModal");
        const poName = document.getElementById("poName");
        const poRank = document.getElementById("poRank");
        const poCallsign = document.getElementById("poCallsign");
        const poError = document.getElementById("poError");

        function openPoliceModal() {
            if (policeModal) {
                policeModal.classList.add("open");
                policeModal.style.display = "flex";
            }
            if (poName) {
                setTimeout(() => poName.focus(), 50);
            }
        }

        if (policeModal) {
            policeModal.addEventListener("click", (e) => {
                if (e.target === policeModal) policeModal.classList.remove("open");
            });
        }

        const poSubmit = document.getElementById("poSubmit");
        if (poSubmit) {
            poSubmit.addEventListener("click", () => {
                const name = poName ? poName.value.trim() : "";
                const rank = poRank ? poRank.value.trim() : "";
                const callsign = poCallsign ? poCallsign.value.trim() : "";
                if (!name) {
                    if (poError) { poError.textContent = "Please enter a name."; poError.style.display = "block"; }
                    return;
                }
                if (poError) { poError.textContent = ""; poError.style.display = "none"; }
                let erlcKey = (currentCommunityData && currentCommunityData.erlc_api_key) || "";
                if (!erlcKey) { try { erlcKey = localStorage.getItem("erlcApiKey_" + currentCommunityId) || ""; } catch (e) {} }
                const params = new URLSearchParams({ name, rank, callsign });
                params.set("community", currentCommunityId || "");
                if (erlcKey) params.set("erlckey", erlcKey);
                if (pendingDepartment) params.set("department", pendingDepartment.id);
                try {
                    localStorage.setItem("policeErkKey", erlcKey);
                    localStorage.setItem("policeOfficerName", name);
                    localStorage.setItem("policeOfficerRank", rank);
                    localStorage.setItem("policeOfficerCallsign", callsign);
                    const officerId = localStorage.getItem("policeOfficerId") || ("officer-" + Math.random().toString(36).slice(2, 10));
                    localStorage.setItem("policeOfficerId", officerId);
                    const unitsRaw = localStorage.getItem("policeActiveUnits");
                    let units = unitsRaw ? JSON.parse(unitsRaw) : [];
                    const existing = units.findIndex(u => u.id === officerId);
                    const entry = { id: officerId, name, rank, callsign, status: "available", updated_at: new Date().toISOString() };
                    if (existing !== -1) {
                        units[existing] = entry;
                    } else {
                        units.push(entry);
                    }
                    localStorage.setItem("policeActiveUnits", JSON.stringify(units));
                } catch (e) {}
                window.open("/Police.html?" + params.toString(), "_blank");
                if (policeModal) policeModal.classList.remove("open");
                pendingDepartment = null;
            });
        }

        const deptPasscodeModal = document.getElementById("departmentPasscodeModal");
        const deptPasscodeModalClose = document.getElementById("deptPasscodeModalClose");
        const deptPasscodeInput = document.getElementById("deptPasscodeInput");
        const deptPasscodeSubmitBtn = document.getElementById("deptPasscodeSubmitBtn");
        const deptPasscodeError = document.getElementById("deptPasscodeError");
        const deptPasscodeTitle = document.getElementById("deptPasscodeTitle");
        let pendingDepartment = null;

        function openPoliceForDepartment(department) {
            pendingDepartment = department;
            openPoliceModal();
        }

        function openDeptPasscodeModal(department) {
            pendingDepartment = department;
            if (deptPasscodeTitle) deptPasscodeTitle.textContent = department.name + " - Passcode";
            if (deptPasscodeInput) deptPasscodeInput.value = "";
            if (deptPasscodeError) { deptPasscodeError.textContent = ""; deptPasscodeError.style.display = "none"; }
            if (deptPasscodeModal) deptPasscodeModal.classList.add("open");
            if (deptPasscodeInput) deptPasscodeInput.focus();
        }

        function handleDepartmentClick(department) {
            if (!department.passcode) {
                openPoliceForDepartment(department);
                return;
            }
            openDeptPasscodeModal(department);
        }

        if (deptPasscodeModalClose) {
            deptPasscodeModalClose.addEventListener("click", () => {
                if (deptPasscodeModal) deptPasscodeModal.classList.remove("open");
                pendingDepartment = null;
            });
        }

        if (deptPasscodeModal) {
            deptPasscodeModal.addEventListener("click", (e) => {
                if (e.target === deptPasscodeModal) {
                    deptPasscodeModal.classList.remove("open");
                    pendingDepartment = null;
                }
            });
        }

        const editDepartmentModal = document.getElementById("editDepartmentModal");
        const editDeptModalClose = document.getElementById("editDeptModalClose");
        
        if (editDeptModalClose && editDepartmentModal) {
            editDeptModalClose.addEventListener("click", () => {
                editDepartmentModal.classList.remove("open");
            });
        }
        
        if (editDepartmentModal) {
            editDepartmentModal.addEventListener("click", (e) => {
                if (e.target === editDepartmentModal) {
                    editDepartmentModal.classList.remove("open");
                }
            });
        }

        if (deptPasscodeSubmitBtn) {
            deptPasscodeSubmitBtn.addEventListener("click", () => {
                if (!pendingDepartment) return;
                const entered = deptPasscodeInput ? deptPasscodeInput.value.trim() : "";
                const expected = (pendingDepartment.passcode == null ? "" : String(pendingDepartment.passcode)).trim();
                if (entered === expected && expected !== "") {
                    if (deptPasscodeModal) deptPasscodeModal.classList.remove("open");
                    openPoliceModal();
                } else {
                    if (deptPasscodeError) { deptPasscodeError.textContent = "Incorrect passcode."; deptPasscodeError.style.display = "block"; }
                }
            });
        }

        loadCommunity();
    </script>
</body>
</html>
