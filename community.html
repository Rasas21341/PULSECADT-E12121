<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            padding: 40px 24px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .back-btn {
            margin-bottom: 20px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }

        .community-name {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .community-meta {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-verified {
            color: #ffffff;
            background: #2563eb;
            border: 1px solid #2563eb;
        }

        .badge-suspended {
            color: #ffffff;
            background: #dc2626;
            border: 1px solid #dc2626;
        }

        .badge-joined {
            color: #166534;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }

        .community-description {
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        .community-screen {
            margin-top: 24px;
            min-height: 280px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .role-btn {
            width: 220px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .role-btn:hover {
            background: #f1f5f9;
        }

        .suspended-note {
            color: #dc2626;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .empty {
            color: #64748b;
            font-size: 14px;
            padding: 20px 0;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 22px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 14px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        .field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .05s ease, background .15s ease;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .05s ease, background .15s ease;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .modal-error {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            font-size: 14px;
            display: none;
        }

        .dashboard {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        .dashboard-general-tab {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #0f172a;
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 0 10px 10px 0;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            z-index: 600;
            border: 1px solid #e2e8f0;
            border-left: none;
        }

        .dashboard-general-tab:hover {
            background: #1e293b;
        }

        .dashboard-panel {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            max-height: 80vh;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0 12px 12px 0;
            box-shadow: 10px 0 30px rgba(0,0,0,0.08);
            padding: 20px;
            z-index: 601;
            display: none;
        }

        .dashboard-panel.open {
            display: block;
        }

        .dashboard-panel-title {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .approval-options {
            display: flex;
            gap: 8px;
        }

        .approval-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .approval-btn.active {
            background: #0f172a;
            color: #ffffff;
            border-color: #0f172a;
        }

        .dashboard-dropdown {
            margin-top: 12px;
            border-top: 1px solid #f1f5f9;
            padding-top: 12px;
        }

        .dropdown-toggle {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #0f172a;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
        }

        .dropdown-toggle:hover {
            background: #f1f5f9;
        }

        .dropdown-menu {
            margin-top: 6px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            padding: 8px;
            display: none;
        }

        .dropdown-menu.open {
            display: block;
        }

        .dropdown-item {
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #334155;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
        }

        .member-item {
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        .request-item {
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .request-item button {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .request-item button.approve {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }

        .request-item button.deny {
            background: #fef2f2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .role-btn {
            width: 220px;
            padding: 0;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .role-btn:hover {
            background: #f1f5f9;
        }

        .role-btn-banner {
            width: 100%;
            height: 80px;
            object-fit: cover;
            display: block;
            background-color: #e2e8f0;
        }

        .role-btn-name {
            padding: 10px 16px;
            text-align: center;
        }

        .dept-banner-preview {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 8px;
            display: none;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" id="backBtn">← Back</button>
        <div id="content"><div class="empty">Loading community...</div></div>
    </div>

    <div class="modal-overlay" id="policeModal">
        <div class="modal">
            <div class="modal-title">Officer Details</div>
            <div class="field">
                <label for="poName">Name</label>
                <input type="text" id="poName" placeholder="Officer name" />
            </div>
            <div class="field">
                <label for="poRank">Rank</label>
                <input type="text" id="poRank" placeholder="e.g. Sergeant" />
            </div>
            <div class="field">
                <label for="poCallsign">Callsign</label>
                <input type="text" id="poCallsign" placeholder="e.g. 1A-12" />
            </div>
            <button type="button" class="submit-btn" id="poSubmit">Enter MDT</button>
            <div class="modal-error" id="poError"></div>
        </div>
    </div>

    <div class="modal-overlay" id="departmentPasscodeModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="deptPasscodeTitle">Department Passcode</div>
                <button class="modal-close" id="deptPasscodeModalClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="field">
                <label for="deptPasscodeInput">Enter passcode</label>
                <input type="text" id="deptPasscodeInput" placeholder="Passcode" />
            </div>
            <button type="button" class="submit-btn" id="deptPasscodeSubmitBtn">Enter</button>
            <div class="modal-error" id="deptPasscodeError"></div>
        </div>
    </div>

    <div class="modal-overlay" id="editDepartmentModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Edit Department</div>
                <button class="modal-close" id="editDeptModalClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="field">
                <label for="editDeptName">Department Name</label>
                <input type="text" id="editDeptName" placeholder="Department name" />
            </div>
            <div class="field">
                <label for="editDeptPasscode">Passcode (leave blank to remove)</label>
                <input type="text" id="editDeptPasscode" placeholder="Passcode" />
            </div>
            <div class="field">
                <label>Banner Image</label>
                <input type="file" id="editDeptBanner" accept="image/*" />
                <img id="editDeptBannerPreview" class="dept-banner-preview" />
            </div>
            <button type="button" class="submit-btn" id="editDeptSubmitBtn">Save Changes</button>
            <div class="modal-error" id="editDeptError"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const contentEl = document.getElementById("content");

        document.getElementById("backBtn").addEventListener("click", () => window.close());

        async function loadCommunity() {
            try {
                const params = new URLSearchParams(window.location.search);
                const id = params.get("id");
                const dashboard = params.get("dashboard");
                if (!id) {
                    contentEl.innerHTML = `<div class="empty">No community specified.</div>`;
                    return;
                }

                const { data, error } = await localSupabase
                    .from("communities")
                    .select("*")
                    .eq("id", id)
                    .maybeSingle();

                if (error) {
                    contentEl.innerHTML = `<div class="empty">Failed to load community: ${error.message}</div>`;
                    return;
                }
                if (!data) {
                    contentEl.innerHTML = `<div class="empty">Community not found.</div>`;
                    return;
                }

                const name = (data.name || "N/A").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const description = (data.description || "No description.").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const creator = (data.creator_email || "Unknown").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const created = data.created_at ? new Date(data.created_at).toLocaleString() : "";
                const suspended = !!data.suspended;
                const joined = !!data.joined;
                const verified = !!data.verification_requested;

                const badges = [];
                if (verified) badges.push('<span class="badge badge-verified">Verified</span>');
                if (suspended) badges.push('<span class="badge badge-suspended">Suspended</span>');
                if (joined) badges.push('<span class="badge badge-joined">Joined</span>');

                const communityPasscode = data?.passcode || "";

                if (dashboard === "1") {
                    try {
                        let currentEmail = "";
                        try {
                            const userData = await localSupabase.auth.getUser();
                            currentEmail = userData?.data?.user?.email || "";
                        } catch (authErr) {
                            console.error("Auth check failed:", authErr);
                        }
                        const { data: communityData } = await localSupabase
                            .from("communities")
                            .select("*")
                            .eq("id", id)
                            .maybeSingle();
                        if (!communityData || communityData.creator_email !== currentEmail) {
                            contentEl.innerHTML = `<div class="empty">Access denied. Community creator only.</div>`;
                            return;
                        }
                        const serverName = (communityData.name || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const approvalMode = communityData.join_approval === "manual" ? "manual" : "automatic";

                        contentEl.innerHTML = `
                            <div class="dashboard">
                                <div class="dashboard-general-tab" id="generalTabBtn">General</div>
                                <div class="dashboard-panel" id="generalPanel">
                                    <div class="dashboard-panel-title">General</div>
                                    <div class="field">
                                        <label>Server Name</label>
                                        <input type="text" id="serverNameInput" value="${serverName}" />
                                    </div>
                                    <div class="field">
                                        <label>Join Approval</label>
                                        <div class="approval-options">
                                            <button type="button" class="approval-btn ${approvalMode === 'automatic' ? 'active' : ''}" data-value="automatic">Automatic</button>
                                            <button type="button" class="approval-btn ${approvalMode === 'manual' ? 'active' : ''}" data-value="manual">Manual Approval</button>
                                        </div>
                                    </div>
                                    <div class="field">
                                        <label>Community Passcode</label>
                                        <input type="text" id="communityPasscodeInput" placeholder="Leave blank for no passcode" value="${(communityData.passcode || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}" />
                                    </div>
                                    <div class="dashboard-dropdown">
                                        <button type="button" class="dropdown-toggle" id="membersDropdownToggle">Members</button>
                                        <div class="dropdown-menu" id="membersDropdownMenu"></div>
                                        <button type="button" class="dropdown-toggle" id="requestsDropdownToggle" style="margin-top:8px;">Requests</button>
                                        <div class="dropdown-menu" id="requestsDropdownMenu">
                                            <div class="empty" id="requestsStatus">Requests turned off</div>
                                            <div id="requestsList"></div>
                                        </div>
                                        <button type="button" class="dropdown-toggle" id="departmentsDropdownToggle" style="margin-top:8px;">Departments</button>
                                        <div class="dropdown-menu" id="departmentsDropdownMenu">
                                            <div id="departmentsList"></div>
                                            <div class="field" style="margin-top:10px;">
                                                <input type="text" id="newDepartmentInput" placeholder="New department..." />
                                                <input type="text" id="newDepartmentPasscode" placeholder="Passcode (optional)" style="margin-top:8px;" />
                                                <button type="button" class="submit-btn" id="addDepartmentBtn" style="margin-top:8px; padding:8px 12px; font-size:13px;">Add</button>
                                            </div>
                                        </div>
                                        <button type="button" class="dropdown-toggle" id="documentsDropdownToggle" style="margin-top:8px;">Documents</button>
                                        <div class="dropdown-menu" id="documentsDropdownMenu">
                                            <div id="documentsList"></div>
                                            <div class="field" style="margin-top:10px;">
                                                <input type="text" id="newDocumentInput" placeholder="New document title..." />
                                                <div style="font-size:12px; font-weight:600; color:#334155; margin-top:10px; margin-bottom:4px;">Assign Departments</div>
                                                <div id="documentDeptCheckboxes"><div class="empty">Loading departments...</div></div>
                                                <button type="button" class="submit-btn" id="addDocumentBtn" style="margin-top:8px; padding:8px 12px; font-size:13px;">Create Document</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;

                        const generalTabBtn = document.getElementById("generalTabBtn");
                        const generalPanel = document.getElementById("generalPanel");
                        const serverNameInput = document.getElementById("serverNameInput");
                        const approvalBtns = generalPanel.querySelectorAll(".approval-btn");
                        const membersDropdownToggle = document.getElementById("membersDropdownToggle");
                        const membersDropdownMenu = document.getElementById("membersDropdownMenu");
                        const requestsDropdownToggle = document.getElementById("requestsDropdownToggle");
                        const requestsDropdownMenu = document.getElementById("requestsDropdownMenu");
                        const requestsStatus = document.getElementById("requestsStatus");
                        const requestsList = document.getElementById("requestsList");

                        if (generalTabBtn && generalPanel) {
                            generalTabBtn.addEventListener("click", () => {
                                generalPanel.classList.toggle("open");
                            });
                        }

                        if (serverNameInput) {
                            serverNameInput.addEventListener("blur", async () => {
                                const newName = serverNameInput.value.trim();
                                if (!newName) return;
                                try {
                                    await localSupabase
                                        .from("communities")
                                        .update({ name: newName })
                                        .eq("id", id);
                                } catch (err) {
                                    alert("Failed to save server name.");
                                }
                            });
                        }

                        const communityPasscodeInput = document.getElementById("communityPasscodeInput");
                        if (communityPasscodeInput) {
                            communityPasscodeInput.addEventListener("blur", async () => {
                                const newPasscode = communityPasscodeInput.value.trim();
                                try {
                                    await localSupabase
                                        .from("communities")
                                        .update({ passcode: newPasscode || null })
                                        .eq("id", id);
                                } catch (err) {
                                    alert("Failed to save community passcode.");
                                }
                            });
                        }

                        approvalBtns.forEach((btn) => {
                            btn.addEventListener("click", async () => {
                                const mode = btn.getAttribute("data-value");
                                approvalBtns.forEach((b) => b.classList.remove("active"));
                                btn.classList.add("active");
                                try {
                                    await localSupabase
                                        .from("communities")
                                        .update({ join_approval: mode })
                                        .eq("id", id);
                                    if (mode === "automatic") {
                                        if (requestsStatus) requestsStatus.style.display = "block";
                                        if (requestsList) requestsList.innerHTML = "";
                                    } else {
                                        if (requestsStatus) requestsStatus.style.display = "none";
                                        loadRequests();
                                    }
                                } catch (err) {
                                    alert("Failed to update approval mode.");
                                }
                            });
                        });

                        async function loadMembers() {
                            if (!membersDropdownMenu || !localSupabase) return;
                            try {
                                const { data: community } = await localSupabase
                                    .from("communities")
                                    .select("creator_email")
                                    .eq("id", id)
                                    .maybeSingle();

                                const { data: memberRows } = await localSupabase
                                    .from("user_communities")
                                    .select("user_id")
                                    .eq("community_id", id);

                                const rows = Array.isArray(memberRows) ? memberRows : [];
                                const ids = rows.map((r) => r.user_id).filter(Boolean);
                                let emailById = {};
                                if (ids.length > 0) {
                                    const { data: users } = await localSupabase
                                        .from("users")
                                        .select("id, email")
                                        .in("id", ids);
                                    (users || []).forEach((u) => { emailById[u.id] = u.email; });
                                }

                                const esc = (t) => (t || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                                let html = '';
                                if (community && community.creator_email) {
                                    html += `<div class="member-item">${esc(community.creator_email)} (Owner)</div>`;
                                }
                                if (rows.length === 0) {
                                    if (!html) html = '<div class="empty">No members yet.</div>';
                                } else {
                                    html += rows.map((r) => `<div class="member-item">${esc(emailById[r.user_id] || r.user_id)}</div>`).join('');
                                }
                                membersDropdownMenu.innerHTML = html;
                            } catch (err) {
                                membersDropdownMenu.innerHTML = '<div class="empty">Failed to load members.</div>';
                            }
                        }

                        async function loadRequests() {
                            if (!requestsList) return;
                            try {
                                const { data } = await localSupabase
                                    .from("join_requests")
                                    .select("*")
                                    .eq("community_id", id)
                                    .eq("status", "pending");
                                const requests = Array.isArray(data) ? data : [];
                                if (requests.length === 0) {
                                    requestsList.innerHTML = '<div class="empty">No pending requests.</div>';
                                    return;
                                }
                                requestsList.innerHTML = requests.map((r) => `
                                    <div class="request-item" data-request-id="${r.id}">
                                        <span>${(r.user_email || 'Unknown').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                        <div>
                                            <button type="button" class="approve">Approve</button>
                                            <button type="button" class="deny">Deny</button>
                                        </div>
                                    </div>
                                `).join('');
                                requestsList.querySelectorAll(".approve").forEach((btn) => {
                                    btn.addEventListener("click", async (e) => {
                                        const item = e.target.closest(".request-item");
                                        const requestId = item.getAttribute("data-request-id");
                                        await handleRequest(requestId, "approved");
                                    });
                                });
                                requestsList.querySelectorAll(".deny").forEach((btn) => {
                                    btn.addEventListener("click", async (e) => {
                                        const item = e.target.closest(".request-item");
                                        const requestId = item.getAttribute("data-request-id");
                                        await handleRequest(requestId, "denied");
                                    });
                                });
                            } catch (err) {
                                requestsList.innerHTML = '<div class="empty">Failed to load requests.</div>';
                            }
                        }

                        async function handleRequest(requestId, status) {
                            try {
                                await localSupabase
                                    .from("join_requests")
                                    .update({ status })
                                    .eq("id", requestId);
                                if (status === "approved") {
                                    await localSupabase
                                        .from("communities")
                                        .update({ joined: true })
                                        .eq("id", id)
                                        .eq("creator_email", currentEmail);
                                }
                                loadRequests();
                            } catch (err) {
                                alert("Failed to update request.");
                            }
                        }

                        if (membersDropdownToggle && membersDropdownMenu) {
                            membersDropdownToggle.addEventListener("click", () => {
                                membersDropdownMenu.classList.toggle("open");
                                loadMembers();
                            });
                        }

                        if (requestsDropdownToggle && requestsDropdownMenu) {
                            requestsDropdownToggle.addEventListener("click", () => {
                                requestsDropdownMenu.classList.toggle("open");
                                if (approvalMode === "manual") {
                                    loadRequests();
                                }
                            });
                        }

                        const departmentsDropdownToggle = document.getElementById("departmentsDropdownToggle");
                        const departmentsDropdownMenu = document.getElementById("departmentsDropdownMenu");
                        const departmentsList = document.getElementById("departmentsList");
                        const newDepartmentInput = document.getElementById("newDepartmentInput");
                        const addDepartmentBtn = document.getElementById("addDepartmentBtn");

                        async function loadDepartments() {
                            if (!departmentsList || !localSupabase) return;
                            try {
                                const { data } = await localSupabase
                                    .from("departments")
                                    .select("*")
                                    .eq("community_id", id)
                                    .order("created_at", { ascending: true });
                                const departments = Array.isArray(data) ? data : [];
                                if (departments.length === 0) {
                                    departmentsList.innerHTML = '<div class="empty">No departments yet.</div>';
                                    return;
                                }
                                departmentsList.innerHTML = departments.map((d) => `
                                    <div class="request-item" data-department-id="${d.id}">
                                        <div>
                                            ${d.banner ? `<img src="${d.banner}" style="width:100%; max-height:60px; object-fit:cover; border-radius:6px; margin-bottom:6px; display:block;" />` : ""}
                                            <span>${(d.name || 'Department').replace(/</g, '&lt;').replace(/>/g, '&gt;')} ${d.passcode ? '🔒' : ''}</span>
                                        </div>
                                        <div>
                                            <button type="button" class="approve" style="background:#fef9c3; border-color:#fde68a; color:#854d0e;" data-action="edit" data-department-id="${d.id}">Edit</button>
                                            <button type="button" class="deny" style="background:#fef2f2; border-color:#fecaca; color:#991b1b;" data-action="delete" data-department-id="${d.id}">Delete</button>
                                        </div>
                                    </div>
                                `).join('');
                                departmentsList.querySelectorAll("[data-action='delete']").forEach((btn) => {
                                    btn.addEventListener("click", async (e) => {
                                        const item = e.target.closest(".request-item");
                                        const departmentId = item.getAttribute("data-department-id");
                                        await deleteDepartment(departmentId);
                                    });
                                });
                                departmentsList.querySelectorAll("[data-action='edit']").forEach((btn) => {
                                    btn.addEventListener("click", async (e) => {
                                        const item = e.target.closest(".request-item");
                                        const departmentId = item.getAttribute("data-department-id");
                                        const department = departments.find((d) => d.id === departmentId);
                                        if (department) {
                                            await editDepartment(department);
                                        }
                                    });
                                });
                            } catch (err) {
                                departmentsList.innerHTML = '<div class="empty">Failed to load departments.</div>';
                            }
                        }

                        async function addDepartment(name, passcode) {
                            if (!name || !localSupabase) return;
                            try {
                                const payload = { community_id: id, name: name.trim() };
                                if (passcode && passcode.trim()) payload.passcode = passcode.trim();
                                await localSupabase
                                    .from("departments")
                                    .insert([payload]);
                                loadDepartments();
                                if (newDepartmentInput) newDepartmentInput.value = "";
                                if (newDepartmentPasscode) newDepartmentPasscode.value = "";
                            } catch (err) {
                                alert("Failed to add department.");
                            }
                        }

                        async function editDepartment(department) {
                            if (!department || !localSupabase) return;
                            const editModal = document.getElementById("editDepartmentModal");
                            const editDeptName = document.getElementById("editDeptName");
                            const editDeptPasscode = document.getElementById("editDeptPasscode");
                            const editDeptBanner = document.getElementById("editDeptBanner");
                            const editDeptBannerPreview = document.getElementById("editDeptBannerPreview");
                            const editDeptSubmitBtn = document.getElementById("editDeptSubmitBtn");
                            const editDeptError = document.getElementById("editDeptError");
                            const editDeptModalClose = document.getElementById("editDeptModalClose");
                            
                            if (!editModal) return;
                            
                            let currentBanner = department.banner || null;
                            
                            if (editDeptName) editDeptName.value = department.name || "";
                            if (editDeptPasscode) editDeptPasscode.value = department.passcode || "";
                            if (editDeptBannerPreview) {
                                if (currentBanner) {
                                    editDeptBannerPreview.src = currentBanner;
                                    editDeptBannerPreview.style.display = "block";
                                } else {
                                    editDeptBannerPreview.style.display = "none";
                                }
                            }
                            if (editDeptError) { editDeptError.textContent = ""; editDeptError.style.display = "none"; }
                            
                            editModal.classList.add("open");
                            
                            const handleEditDeptBannerChange = (e) => {
                                const file = e.target.files[0];
                                if (!file) return;
                                if (!file.type.startsWith("image/")) {
                                    if (editDeptError) { editDeptError.textContent = "Please select an image file."; editDeptError.style.display = "block"; }
                                    return;
                                }
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    currentBanner = ev.target.result;
                                    if (editDeptBannerPreview) {
                                        editDeptBannerPreview.src = currentBanner;
                                        editDeptBannerPreview.style.display = "block";
                                    }
                                };
                                reader.readAsDataURL(file);
                            };
                            
                            if (editDeptBanner) {
                                editDeptBanner.onchange = handleEditDeptBannerChange;
                            }
                            
                            const handleEditDeptSubmit = async () => {
                                const newName = editDeptName ? editDeptName.value.trim() : "";
                                const newPasscode = editDeptPasscode ? editDeptPasscode.value.trim() : "";
                                
                                if (!newName) {
                                    if (editDeptError) { editDeptError.textContent = "Department name is required."; editDeptError.style.display = "block"; }
                                    return;
                                }
                                
                                try {
                                    const payload = { name: newName };
                                    if (newPasscode) payload.passcode = newPasscode;
                                    else payload.passcode = null;
                                    if (currentBanner !== null) payload.banner = currentBanner;
                                    
                                    console.log("Saving department:", payload);
                                    
                                    await localSupabase
                                        .from("departments")
                                        .update(payload)
                                        .eq("id", department.id);
                                    
                                    editModal.classList.remove("open");
                                    loadDepartments();
                                } catch (err) {
                                    console.error("Failed to update department:", err);
                                    if (editDeptError) { editDeptError.textContent = "Failed to update department."; editDeptError.style.display = "block"; }
                                }
                            };
                            
                            if (editDeptSubmitBtn) {
                                editDeptSubmitBtn.onclick = handleEditDeptSubmit;
                            }
                        }

                        async function deleteDepartment(departmentId) {
                            if (!confirm("Delete this department?")) return;
                            try {
                                await localSupabase
                                    .from("departments")
                                    .delete()
                                    .eq("id", departmentId);
                                loadDepartments();
                            } catch (err) {
                                alert("Failed to delete department.");
                            }
                        }

                        if (departmentsDropdownToggle && departmentsDropdownMenu) {
                            departmentsDropdownToggle.addEventListener("click", () => {
                                departmentsDropdownMenu.classList.toggle("open");
                                loadDepartments();
                            });
                        }

                        const documentsDropdownToggle = document.getElementById("documentsDropdownToggle");
                        const documentsDropdownMenu = document.getElementById("documentsDropdownMenu");
                        const documentsList = document.getElementById("documentsList");
                        const newDocumentInput = document.getElementById("newDocumentInput");
                        const documentDeptCheckboxes = document.getElementById("documentDeptCheckboxes");
                        const addDocumentBtn = document.getElementById("addDocumentBtn");

                        async function loadDocumentDeptCheckboxes() {
                            if (!documentDeptCheckboxes || !localSupabase) return;
                            try {
                                const { data } = await localSupabase
                                    .from("departments")
                                    .select("*")
                                    .eq("community_id", id)
                                    .order("created_at", { ascending: true });
                                const depts = Array.isArray(data) ? data : [];
                                if (depts.length === 0) {
                                    documentDeptCheckboxes.innerHTML = '<div class="empty">No departments to assign. Create a department first.</div>';
                                    return;
                                }
                                documentDeptCheckboxes.innerHTML = depts.map((d) => `
                                    <label style="display:flex; align-items:center; gap:6px; font-size:13px; margin-bottom:4px; cursor:pointer;">
                                        <input type="checkbox" class="doc-dept-cb" value="${(d.name || '').replace(/"/g, '&quot;')}" />
                                        <span>${(d.name || 'Department').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                    </label>
                                `).join('');
                            } catch (err) {
                                documentDeptCheckboxes.innerHTML = '<div class="empty">Failed to load departments.</div>';
                            }
                        }

                        async function loadDocuments() {
                            if (!documentsList || !localSupabase) return;
                            try {
                                const { data } = await localSupabase
                                    .from("documents")
                                    .select("*")
                                    .eq("community_id", id)
                                    .order("created_at", { ascending: false });
                                const docs = Array.isArray(data) ? data : [];
                                if (docs.length === 0) {
                                    documentsList.innerHTML = '<div class="empty">No documents yet.</div>';
                                    return;
                                }
                                documentsList.innerHTML = docs.map((doc) => {
                                    const depts = Array.isArray(doc.departments) ? doc.departments : [];
                                    const chips = depts.map((n) => `<span style="display:inline-block; padding:2px 8px; border-radius:999px; background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; font-size:11px; font-weight:700;">${(n || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>`).join('');
                                    return `
                                        <div class="request-item" data-document-id="${doc.id}">
                                            <div>
                                                <span>${(doc.title || 'Document').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                                ${chips ? `<div style="margin-top:4px; display:flex; flex-wrap:wrap; gap:4px;">${chips}</div>` : ''}
                                            </div>
                                            <div>
                                                <button type="button" class="approve" style="background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8;" data-action="open-doc" data-document-id="${doc.id}">Open</button>
                                                <button type="button" class="approve" style="background:#f0fdf4; border-color:#bbf7d0; color:#166534;" data-action="copy-doc" data-document-id="${doc.id}">Copy Link</button>
                                                <button type="button" class="deny" style="background:#fef2f2; border-color:#fecaca; color:#991b1b;" data-action="delete-doc" data-document-id="${doc.id}">Delete</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('');
                                documentsList.querySelectorAll("[data-action='delete-doc']").forEach((btn) => {
                                    btn.addEventListener("click", async (e) => {
                                        const item = e.target.closest(".request-item");
                                        await deleteDocument(item.getAttribute("data-document-id"));
                                    });
                                });
                                documentsList.querySelectorAll("[data-action='open-doc']").forEach((btn) => {
                                    btn.addEventListener("click", (e) => {
                                        const documentId = e.target.closest(".request-item").getAttribute("data-document-id");
                                        window.open("document.html?id=" + encodeURIComponent(documentId), "_blank");
                                    });
                                });
                                documentsList.querySelectorAll("[data-action='copy-doc']").forEach((btn) => {
                                    btn.addEventListener("click", (e) => {
                                        const documentId = e.target.closest(".request-item").getAttribute("data-document-id");
                                        const link = new URL("document.html", window.location.href);
                                        link.searchParams.set("id", documentId);
                                        if (navigator.clipboard && navigator.clipboard.writeText) {
                                            navigator.clipboard.writeText(link.href)
                                                .then(() => alert("Document link copied to clipboard."))
                                                .catch(() => prompt("Copy this link:", link.href));
                                        } else {
                                            prompt("Copy this link:", link.href);
                                        }
                                    });
                                });
                            } catch (err) {
                                documentsList.innerHTML = '<div class="empty">Failed to load documents.</div>';
                            }
                        }

                        async function addDocument(title, departments) {
                            if (!title || !localSupabase) return;
                            try {
                                await localSupabase
                                    .from("documents")
                                    .insert([{ community_id: id, title: title.trim(), departments: departments }]);
                                if (newDocumentInput) newDocumentInput.value = "";
                                loadDocuments();
                                loadDocumentDeptCheckboxes();
                            } catch (err) {
                                alert("Failed to create document.");
                            }
                        }

                        async function deleteDocument(documentId) {
                            if (!confirm("Delete this document?")) return;
                            try {
                                await localSupabase
                                    .from("documents")
                                    .delete()
                                    .eq("id", documentId);
                                loadDocuments();
                            } catch (err) {
                                alert("Failed to delete document.");
                            }
                        }

                        if (documentsDropdownToggle && documentsDropdownMenu) {
                            documentsDropdownToggle.addEventListener("click", () => {
                                documentsDropdownMenu.classList.toggle("open");
                                if (documentsDropdownMenu.classList.contains("open")) {
                                    loadDocuments();
                                    loadDocumentDeptCheckboxes();
                                }
                            });
                        }

                        if (addDocumentBtn) {
                            addDocumentBtn.addEventListener("click", () => {
                                const title = newDocumentInput ? newDocumentInput.value.trim() : "";
                                if (!title) return;
                                const selected = documentDeptCheckboxes
                                    ? Array.from(documentDeptCheckboxes.querySelectorAll(".doc-dept-cb:checked")).map((cb) => cb.value)
                                    : [];
                                addDocument(title, selected);
                            });
                        }

                        if (addDepartmentBtn) {
                            addDepartmentBtn.addEventListener("click", () => {
                                const name = newDepartmentInput ? newDepartmentInput.value.trim() : "";
                                if (!name) return;
                                const passcode = newDepartmentPasscode ? newDepartmentPasscode.value : "";
                                addDepartment(name, passcode);
                            });
                        }

                        if (newDepartmentInput) {
                            newDepartmentInput.addEventListener("keydown", (e) => {
                                if (e.key === "Enter") {
                                    const name = newDepartmentInput.value.trim();
                                    if (!name) return;
                                    const passcode = newDepartmentPasscode ? newDepartmentPasscode.value : "";
                                    addDepartment(name, passcode);
                                }
                            });
                        }

                        if (approvalMode === "manual") {
                            if (requestsStatus) requestsStatus.style.display = "none";
                            loadRequests();
                        }
                    } catch (err) {
                        contentEl.innerHTML = `<div class="empty">Failed to load dashboard: ${err?.message || err}</div>`;
                        console.error("Dashboard load failed:", err);
                    }
                    return;
                }

                if (communityPasscode) {
                    const sessionPasscode = sessionStorage.getItem("community_passcode_" + id);
                    if (sessionPasscode !== communityPasscode) {
                        contentEl.innerHTML = `
                            <div class="community-name">${name}</div>
                            <div class="community-meta">This community is passcode protected.</div>
                            <div class="field" style="max-width: 320px; margin-top: 16px;">
                                <input type="text" id="communityPasscodeEntry" placeholder="Enter passcode" />
                            </div>
                            <button type="button" class="submit-btn" id="communityPasscodeSubmit" style="max-width: 320px; margin-top: 8px;">Enter</button>
                            <div class="modal-error" id="communityPasscodeError"></div>
                        `;
                        const communityPasscodeEntry = document.getElementById("communityPasscodeEntry");
                        const communityPasscodeSubmit = document.getElementById("communityPasscodeSubmit");
                        const communityPasscodeError = document.getElementById("communityPasscodeError");
                        if (communityPasscodeSubmit) {
                            communityPasscodeSubmit.addEventListener("click", () => {
                                const entered = communityPasscodeEntry ? communityPasscodeEntry.value.trim() : "";
                                if (entered === communityPasscode) {
                                    sessionStorage.setItem("community_passcode_" + id, entered);
                                    loadCommunity();
                                } else {
                                    if (communityPasscodeError) { communityPasscodeError.textContent = "Incorrect passcode."; communityPasscodeError.style.display = "block"; }
                                }
                            });
                        }
                        if (communityPasscodeEntry) {
                            communityPasscodeEntry.addEventListener("keydown", (e) => {
                                if (e.key === "Enter") {
                                    const entered = communityPasscodeEntry.value.trim();
                                    if (entered === communityPasscode) {
                                        sessionStorage.setItem("community_passcode_" + id, entered);
                                        loadCommunity();
                                    } else {
                                        if (communityPasscodeError) { communityPasscodeError.textContent = "Incorrect passcode."; communityPasscodeError.style.display = "block"; }
                                    }
                                }
                            });
                        }
                        return;
                    }
                }

                contentEl.innerHTML = `
                    <button type="button" class="role-btn" data-role="Civilian">Civilian</button>
                    <div id="communityDepartments"></div>
                `;

                const communityDepartments = document.getElementById("communityDepartments");
                if (communityDepartments && localSupabase) {
                    localSupabase
                        .from("departments")
                        .select("*")
                        .eq("community_id", id)
                        .order("created_at", { ascending: true })
                        .then(({ data }) => {
                            const departments = Array.isArray(data) ? data : [];
                            departments.forEach((dept) => {
                                const btn = document.createElement("button");
                                btn.type = "button";
                                btn.className = "role-btn";
                                const bannerImg = document.createElement("img");
                                bannerImg.className = "role-btn-banner";
                                bannerImg.alt = (dept.name || "Department") + " banner";
                                if (dept.banner) {
                                    bannerImg.src = dept.banner;
                                } else {
                                    bannerImg.style.display = "none";
                                }
                                const nameSpan = document.createElement("div");
                                nameSpan.className = "role-btn-name";
                                nameSpan.textContent = dept.name;
                                btn.appendChild(bannerImg);
                                btn.appendChild(nameSpan);
                                btn.setAttribute("data-department-id", dept.id);
                                btn.setAttribute("data-passcode", dept.passcode || "");
                                communityDepartments.appendChild(btn);
                                btn.addEventListener("click", () => handleDepartmentClick(dept));
                            });
                        });
                }

                contentEl.querySelectorAll(".role-btn[data-role='Civilian']").forEach((btn) => {
                    btn.addEventListener("click", () => {
                        window.open("civilian.html", "_blank");
                    });
                });
            } catch (err) {
                contentEl.innerHTML = `<div class="empty">An unexpected error occurred: ${err?.message || err}</div>`;
                console.error("loadCommunity failed:", err);
            }
        }

        const policeModal = document.getElementById("policeModal");
        const poName = document.getElementById("poName");
        const poRank = document.getElementById("poRank");
        const poCallsign = document.getElementById("poCallsign");
        const poError = document.getElementById("poError");

        function openPoliceModal() {
            if (policeModal) policeModal.classList.add("open");
            if (poName) poName.focus();
        }

        if (policeModal) {
            policeModal.addEventListener("click", (e) => {
                if (e.target === policeModal) policeModal.classList.remove("open");
            });
        }

        const poSubmit = document.getElementById("poSubmit");
        if (poSubmit) {
            poSubmit.addEventListener("click", () => {
                const name = poName ? poName.value.trim() : "";
                const rank = poRank ? poRank.value.trim() : "";
                const callsign = poCallsign ? poCallsign.value.trim() : "";
                if (!name) {
                    if (poError) { poError.textContent = "Please enter a name."; poError.style.display = "block"; }
                    return;
                }
                if (poError) { poError.textContent = ""; poError.style.display = "none"; }
                const params = new URLSearchParams({ name, rank, callsign });
                window.open("police.html?" + params.toString(), "_blank");
                if (policeModal) policeModal.classList.remove("open");
            });
        }

        const deptPasscodeModal = document.getElementById("departmentPasscodeModal");
        const deptPasscodeModalClose = document.getElementById("deptPasscodeModalClose");
        const deptPasscodeInput = document.getElementById("deptPasscodeInput");
        const deptPasscodeSubmitBtn = document.getElementById("deptPasscodeSubmitBtn");
        const deptPasscodeError = document.getElementById("deptPasscodeError");
        const deptPasscodeTitle = document.getElementById("deptPasscodeTitle");
        let pendingDepartment = null;

        function openDeptPasscodeModal(department) {
            pendingDepartment = department;
            if (deptPasscodeTitle) deptPasscodeTitle.textContent = department.name + " - Passcode";
            if (deptPasscodeInput) deptPasscodeInput.value = "";
            if (deptPasscodeError) { deptPasscodeError.textContent = ""; deptPasscodeError.style.display = "none"; }
            if (deptPasscodeModal) deptPasscodeModal.classList.add("open");
            if (deptPasscodeInput) deptPasscodeInput.focus();
        }

        function handleDepartmentClick(department) {
            if (!department.passcode) {
                window.open("police.html", "_blank");
                return;
            }
            openDeptPasscodeModal(department);
        }

        if (deptPasscodeModalClose) {
            deptPasscodeModalClose.addEventListener("click", () => {
                if (deptPasscodeModal) deptPasscodeModal.classList.remove("open");
                pendingDepartment = null;
            });
        }

        if (deptPasscodeModal) {
            deptPasscodeModal.addEventListener("click", (e) => {
                if (e.target === deptPasscodeModal) {
                    deptPasscodeModal.classList.remove("open");
                    pendingDepartment = null;
                }
            });
        }

        const editDepartmentModal = document.getElementById("editDepartmentModal");
        const editDeptModalClose = document.getElementById("editDeptModalClose");
        
        if (editDeptModalClose && editDepartmentModal) {
            editDeptModalClose.addEventListener("click", () => {
                editDepartmentModal.classList.remove("open");
            });
        }
        
        if (editDepartmentModal) {
            editDepartmentModal.addEventListener("click", (e) => {
                if (e.target === editDepartmentModal) {
                    editDepartmentModal.classList.remove("open");
                }
            });
        }

        if (deptPasscodeSubmitBtn) {
            deptPasscodeSubmitBtn.addEventListener("click", () => {
                if (!pendingDepartment) return;
                const entered = deptPasscodeInput ? deptPasscodeInput.value.trim() : "";
                if (entered === pendingDepartment.passcode) {
                    if (deptPasscodeModal) deptPasscodeModal.classList.remove("open");
                    window.open("police.html", "_blank");
                    pendingDepartment = null;
                } else {
                    if (deptPasscodeError) { deptPasscodeError.textContent = "Incorrect passcode."; deptPasscodeError.style.display = "block"; }
                }
            });
        }

        loadCommunity();
    </script>
</body>
</html>
