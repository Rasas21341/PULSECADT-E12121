<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            padding: 24px 16px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .sidebar-btn {
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .sidebar-btn:hover {
            background: #f1f5f9;
        }

        .department-select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .main {
            margin-left: 220px;
            padding: 40px 24px;
            flex: 1;
            width: calc(100% - 220px);
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        td {
            color: #334155;
            word-break: break-word;
        }

        .empty {
            color: #64748b;
            font-size: 14px;
            padding: 20px 0;
        }

        .verified-btn {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            color: #ffffff;
            background: #2563eb;
        }

        .verified-btn:hover {
            background: #1d4ed8;
        }

        .icon-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
        }

        .icon-btn:hover {
            background: #f1f5f9;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            padding: 8px 16px;
            width: 320px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            background: #2563eb;
        }

        .status-pill svg {
            flex-shrink: 0;
        }

        .app-head {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
        }

        .app-form {
            max-width: 560px;
        }

        .app-form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin: 16px 0 6px;
        }

        .app-form input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            color: #1a202c;
        }

        .app-form .verified-btn {
            margin-top: 20px;
        }

        .verified-yes {
            background: #166534;
            color: #ffffff;
        }

        .verified-yes:hover {
            background: #15803d;
        }

        .department-select {
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .master-actions {
            margin-top: 28px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
        }

        .master-actions h2 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .master-actions p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .master-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 0;
            border-top: 1px solid #f1f5f9;
        }

        .master-row-label {
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
        }

        .master-row-sub {
            font-size: 13px;
            color: #64748b;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #cbd5e1;
            border-radius: 999px;
            transition: background .15s ease;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 22px;
            width: 22px;
            left: 3px;
            top: 3px;
            background: #ffffff;
            border-radius: 50%;
            transition: transform .15s ease;
        }

        .switch input:checked + .slider {
            background: #2563eb;
        }

        .switch input:checked + .slider::before {
            transform: translateX(22px);
        }

        .codes-section {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .codes-section h2 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .codes-section p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .premium-key-display {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .premium-key-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            color: #1a202c;
            background: #f8fafc;
            font-family: monospace;
        }

        .codes-search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .codes-search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            color: #1a202c;
            background: #ffffff;
        }

        .codes-list-section {
            margin-top: 20px;
        }

        .codes-list-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .codes-count {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .codes-list-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
        }

        .codes-list-table th,
        .codes-list-table td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        .codes-list-table th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .codes-list-table tr:last-child td {
            border-bottom: none;
        }

        .codes-list-table td {
            color: #334155;
            word-break: break-all;
            font-family: monospace;
        }

        .codes-used-no {
            color: #16a34a;
            font-weight: 700;
        }

        .codes-used-yes {
            color: #dc2626;
            font-weight: 700;
        }

        .delete-code-btn {
            background: #dc2626;
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .delete-code-btn:hover {
            background: #b91c1c;
        }

        .give-key-btn {
            background: #16a34a;
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .give-key-btn:hover {
            background: #15803d;
        }
    </style></head>
<body>
    <div class="sidebar">
        <div class="sidebar-title">Staff Dashboard</div>
        <button class="sidebar-btn" id="serversBtn">Servers</button>
        <button class="sidebar-btn" id="staffUsersBtn">Users</button>
        <button class="sidebar-btn" id="applicationsBtn">Applications</button>
        <button class="sidebar-btn" id="codesBtn" style="display:none;">CODES</button>
        <button class="sidebar-btn" id="masterActionsBtn" style="display:none;">Master Actions</button>
    </div>
    <div class="main">
        <div class="container">
            <h1 id="pageTitle">Servers</h1>
            <div id="status"></div>
            <div id="content"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const statusEl = document.getElementById("status");
        const contentEl = document.getElementById("content");
        const pageTitle = document.getElementById("pageTitle");
        const serversBtn = document.getElementById("serversBtn");
        const staffUsersBtn = document.getElementById("staffUsersBtn");
        const applicationsBtn = document.getElementById("applicationsBtn");
        const codesBtn = document.getElementById("codesBtn");
        const masterActionsBtn = document.getElementById("masterActionsBtn");

        let localSupabase = null;
        try {
            if (typeof window.supabase !== "undefined") {
                localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (err) {
            console.error("Supabase init failed:", err);
        }

        function showStatus(message, type) {
            if (!statusEl) return;
            statusEl.className = "status " + (type || "");
            statusEl.textContent = message;
        }

        async function ensureStaff() {
            if (!localSupabase) {
                showStatus("Authentication service unavailable.", "error");
                return { allowed: false };
            }
            try {
                const { data: { user } } = await localSupabase.auth.getUser();
                if (!user) {
                    showStatus("Access denied. Staff only.", "error");
                    return { allowed: false };
                }
                if (user.email === "oceanviewrp1@gmail.com") {
                    return { allowed: true, department: "Management" };
                }
                const { data, error } = await localSupabase
                    .from("users")
                    .select("department")
                    .eq("email", user.email)
                    .maybeSingle();
                if (error) {
                    showStatus("Access denied. Staff only.", "error");
                    return { allowed: false };
                }
                const department = (data?.department || "").trim();
                if (department.toLowerCase() === "management" || department.toLowerCase() === "support team") {
                    return { allowed: true, department };
                }
                showStatus("Access denied. Staff only.", "error");
                return { allowed: false };
            } catch (err) {
                showStatus("An unexpected error occurred.", "error");
                console.error(err);
                return { allowed: false };
            }
        }

        async function getUserDepartment() {
            if (!localSupabase) return "";
            try {
                const { data: { user } } = await localSupabase.auth.getUser();
                if (!user) return "";
                if (user.email === "oceanviewrp1@gmail.com") return "Management";
                const { data } = await localSupabase
                    .from("users")
                    .select("department")
                    .eq("email", user.email)
                    .maybeSingle();
                return data?.department || "";
            } catch (err) {
                console.error("Failed to get department:", err);
                return "";
            }
        }

        async function loadServers() {
            const staff = await ensureStaff();
            if (!staff.allowed) return;
            const userDepartment = staff.department || await getUserDepartment();
            pageTitle.textContent = "Servers";
            contentEl.innerHTML = '<div class="empty">Loading servers...</div>';

            try {
                const { data, error } = await localSupabase
                    .from("communities")
                    .select("*")
                    .order("created_at", { ascending: false });

                if (error) {
                    contentEl.innerHTML = `<div class="empty">Failed to load servers: ${error.message}</div>`;
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    contentEl.innerHTML = `<div class="empty">No servers found.</div>`;
                    return;
                }

                let html = `<table><tr><th>Name</th><th>Owner</th><th>Created</th><th>Status</th><th>Members Only</th><th>Actions</th></tr>`;
                const canSuspend = userDepartment !== "Support Team";
                const canDelete = userDepartment !== "Support Team";
                data.forEach((row) => {
                    const name = (row.name || "N/A").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const owner = (row.creator_email || "N/A").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const created = row.created_at ? new Date(row.created_at).toLocaleString() : "";
                    const suspended = !!row.suspended;
                    const membersOnly = !!row.members_only;
                    const statusCell = suspended
                        ? `<span class="status-pill" style="background:#dc2626;width:auto;">Suspended</span>`
                        : `<span class="status-pill" style="background:#16a34a;width:auto;">Active</span>`;
                    const membersOnlyCell = membersOnly
                        ? `<span class="status-pill" style="background:#2563eb;width:auto;">Members Only</span>`
                        : `<span style="color:#94a3b8;font-size:12px;font-weight:600;">Public</span>`;
                    const suspendBtn = canSuspend
                        ? `<button class="verified-btn suspend-server-btn" data-id="${row.id}" data-suspended="${suspended}">${suspended ? "Unsuspend" : "Suspend"}</button>`
                        : `<span style="color:#94a3b8;font-size:12px;font-weight:600;">No Permission</span>`;
                    const deleteBtn = canDelete
                        ? `<button class="verified-btn delete-server-btn" data-id="${row.id}">Delete</button>`
                        : `<span style="color:#94a3b8;font-size:12px;font-weight:600;">No Permission</span>`;
                    html += `<tr><td>${name}</td><td>${owner}</td><td>${created}</td><td>${statusCell}</td><td>${membersOnlyCell}</td><td>${suspendBtn} ${deleteBtn}</td></tr>`;
                });
                html += "</table>";
                contentEl.innerHTML = html;

                contentEl.querySelectorAll(".suspend-server-btn").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        const dept = await getUserDepartment();
                        if (dept === "Support Team") {
                            alert("Access denied. Support Team cannot suspend servers.");
                            return;
                        }
                        const id = btn.getAttribute("data-id");
                        const currently = btn.getAttribute("data-suspended") === "true";
                        const { error } = await localSupabase
                            .from("communities")
                            .update({ suspended: !currently })
                            .eq("id", id);
                        if (error) {
                            alert("Failed to suspend server: " + error.message);
                            return;
                        }
                        loadServers();
                    });
                });

                contentEl.querySelectorAll(".delete-server-btn").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        const dept = await getUserDepartment();
                        if (dept === "Support Team") {
                            alert("Access denied. Support Team cannot delete servers.");
                            return;
                        }
                        const id = btn.getAttribute("data-id");
                        const { error } = await localSupabase
                            .from("communities")
                            .delete()
                            .eq("id", id);
                        if (error) {
                            alert("Failed to delete server: " + error.message);
                            return;
                        }
                        loadServers();
                    });
                });
            } catch (err) {
                contentEl.innerHTML = `<div class="empty">An unexpected error occurred.</div>`;
                console.error(err);
            }
        }

        async function loadStaffUsers() {
            const staff = await ensureStaff();
            if (!staff.allowed) return;
            pageTitle.textContent = "Users";
            contentEl.innerHTML = '<div class="empty">Loading users...</div>';

            try {
                const { data, error } = await localSupabase
                    .from("users")
                    .select("id, email, created_at, department, ip")
                    .order("created_at", { ascending: false });

                if (error) {
                    contentEl.innerHTML = `<div class="empty">Failed to load users: ${error.message}</div>`;
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    contentEl.innerHTML = `<div class="empty">No users found.</div>`;
                    return;
                }

                const userDepartment = await getUserDepartment();
                const isManagement = userDepartment === "Management";
                let html = `<table><tr><th>Email</th><th>Created</th><th>Department</th>${isManagement ? "<th>IP</th>" : ""}<th>Actions</th></tr>`;
                data.forEach((row) => {
                    const email = (row.email || "N/A").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const created = row.created_at ? new Date(row.created_at).toLocaleString() : "";
                    const currentDept = row.department || "";
                    const ipCell = isManagement ? `<td>${(row.ip || "N/A").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</td>` : "";
                    const giveKeyBtn = userDepartment === "Management" ? `<button type="button" class="give-key-btn" data-user-id="${row.id}" data-email="${email.replace(/"/g, '&quot;')}">Give Key</button>` : `<span style="color:#94a3b8;font-size:12px;font-weight:600;">No Permission</span>`;
                    html += `<tr><td>${email}</td><td>${created}</td><td><select class="department-select" data-user-id="${row.id}"><option value="">Unassigned</option><option value="Management" ${currentDept === 'Management' ? 'selected' : ''}>Management</option><option value="Support Team" ${currentDept === 'Support Team' ? 'selected' : ''}>Support Team</option><option value="Development Team" ${currentDept === 'Development Team' ? 'selected' : ''}>Development Team</option></select></td>${ipCell}<td>${giveKeyBtn}</td></tr>`;
                });
                html += "</table>";
                contentEl.innerHTML = html;

                contentEl.querySelectorAll(".department-select").forEach((select) => {
                    select.addEventListener("change", async () => {
                        const userId = select.getAttribute("data-user-id");
                        const newDepartment = select.value;
                        const { error } = await localSupabase
                            .from("users")
                            .update({ department: newDepartment })
                            .eq("id", userId);
                        if (error) {
                            alert("Failed to update department: " + error.message);
                        }
                    });
                });

                contentEl.querySelectorAll(".give-key-btn").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        const dept = await getUserDepartment();
                        if (dept !== "Management") {
                            alert("Access denied. Management only.");
                            return;
                        }
                        const userEmail = btn.getAttribute("data-email");
                        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                        let key = "MDT-";
                        for (let i = 0; i < 16; i++) {
                            key += chars.charAt(Math.floor(Math.random() * chars.length));
                        }
                        const { error } = await localSupabase
                            .from("premium_keys")
                            .insert([{ key: key, used: true, used_by: userEmail, used_at: new Date().toISOString(), created_at: new Date().toISOString() }]);
                        if (error) {
                            alert("Failed to give key: " + error.message);
                            return;
                        }
                        alert("Key given successfully: " + key);
                    });
                });
            } catch (err) {
                contentEl.innerHTML = `<div class="empty">An unexpected error occurred.</div>`;
                console.error(err);
            }
        }

        async function initSidebar() {
            const dept = (await getUserDepartment() || "").trim();
            const lower = dept.toLowerCase();
            if (applicationsBtn && (lower === "support team" || lower === "customer support")) {
                applicationsBtn.style.display = "none";
            }
            if (codesBtn && (lower === "management" || lower === "support team")) {
                codesBtn.style.display = "block";
            }
            if (masterActionsBtn && lower === "management") {
                masterActionsBtn.style.display = "block";
            }
        }

        if (serversBtn) {
            serversBtn.addEventListener("click", loadServers);
        }

        if (staffUsersBtn) {
            staffUsersBtn.addEventListener("click", loadStaffUsers);
        }

        if (applicationsBtn) {
            applicationsBtn.addEventListener("click", loadApplications);
        }

        if (masterActionsBtn) {
            masterActionsBtn.addEventListener("click", loadMasterActions);
        }

        if (codesBtn) {
            codesBtn.addEventListener("click", loadCodes);
        }

        initSidebar();

        async function loadApplications() {
            const staff = await ensureStaff();
            if (!staff.allowed) return;
            if ((staff.department || "").toLowerCase() === "support team" || (staff.department || "").toLowerCase() === "customer support") {
                showStatus("Access denied. Support staff cannot access Applications.", "error");
                return;
            }
            pageTitle.textContent = "Applications";
            contentEl.innerHTML = `
                <table>
                    <tr>
                        <td>
                            
                            <div class="status-pill">
                                Customer Support Team Application
                                <button type="button" class="icon-btn" id="openAppBtn" title="Open application"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
                                <button type="button" class="icon-btn" id="viewAppBtn" title="View application"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                                <button type="button" class="icon-btn" id="viewSubsBtn" title="View submissions"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
                            </div>

        async function loadCodes() {
            const staff = await ensureStaff();
            if (!staff.allowed) return;
            if (staff.department !== "Management" && staff.department !== "Support Team") {
                showStatus("Access denied.", "error");
                return;
            }
            pageTitle.textContent = "Codes";
            contentEl.innerHTML = `
                <div class="codes-section">
                    <h2>Premium Key Generator</h2>
                    <p>Generate a new premium key for PulseCAD. Keys start with MDT and are one-time use.</p>
                    <div class="premium-key-display">
                        <input type="text" class="premium-key-input" id="generatedPremiumKey" readonly />
                        <button type="button" class="verified-btn" id="generatePremiumKeyBtn">Generate</button>
                        <button type="button" class="verified-btn" id="copyPremiumKeyBtn">Copy</button>
                    </div>
                </div>
                <div class="codes-list-section">
                    <h3>Existing Keys</h3>
                    <div class="codes-search-row">
                        <input type="text" class="codes-search-input" id="codesSearchInput" placeholder="Search codes..." />
                    </div>
                    <div class="codes-count" id="codesCount"></div>
                    <table class="codes-list-table">
                        <tr><th>Key</th><th>Used</th><th>Created</th><th>Actions</th></tr>
                        <tbody id="codesListBody"><tr><td colspan="4"><div class="empty">Loading...</div></td></tr></tbody>
                    </table>
                </div>
            `;

            const generateKeyBtn = document.getElementById("generatePremiumKeyBtn");
            const copyKeyBtn = document.getElementById("copyPremiumKeyBtn");
            const keyInput = document.getElementById("generatedPremiumKey");
            const searchInput = document.getElementById("codesSearchInput");
            const codesListBody = document.getElementById("codesListBody");
            const codesCount = document.getElementById("codesCount");

            async function renderCodes(filterText = "") {
                if (!codesListBody || !localSupabase) return;
                try {
                    const { data, error } = await localSupabase
                        .from("premium_keys")
                        .select("*")
                        .order("created_at", { ascending: false });
                    if (error) {
                        codesListBody.innerHTML = `<tr><td colspan="4"><div class="empty">Failed to load codes: ${error.message}</div></td></tr>`;
                        return;
                    }
                    const rows = Array.isArray(data) ? data : [];
                    const filtered = filterText
                        ? rows.filter((row) => (row.key || "").toLowerCase().includes(filterText.toLowerCase()))
                        : rows;
                    if (codesCount) codesCount.textContent = `${filtered.length} code${filtered.length === 1 ? '' : 's'} found`;
                    if (filtered.length === 0) {
                        codesListBody.innerHTML = `<tr><td colspan="4"><div class="empty">No codes found.</div></td></tr>`;
                        return;
                    }
                    codesListBody.innerHTML = filtered.map((row) => {
                        const usedText = row.used ? "Yes" : "No";
                        const usedClass = row.used ? "codes-used-yes" : "codes-used-no";
                        const created = row.created_at ? new Date(row.created_at).toLocaleString() : "";
                        return `<tr><td>${(row.key || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</td><td class="${usedClass}">${usedText}</td><td>${created}</td><td><button type="button" class="delete-code-btn" data-id="${row.id}">Delete</button></td></tr>`;
                    }).join("");

                    contentEl.querySelectorAll(".delete-code-btn").forEach((btn) => {
                        btn.addEventListener("click", async () => {
                            const id = btn.getAttribute("data-id");
                            if (!confirm("Are you sure you want to delete this code?")) return;
                            const { error } = await localSupabase
                                .from("premium_keys")
                                .delete()
                                .eq("id", id);
                            if (error) {
                                alert("Failed to delete code: " + error.message);
                                return;
                            }
                            renderCodes(searchInput.value.trim());
                        });
                    });
                } catch (err) {
                    codesListBody.innerHTML = `<tr><td colspan="3"><div class="empty">An unexpected error occurred.</div></td></tr>`;
                    console.error(err);
                }
            }

            renderCodes();

            if (searchInput) {
                searchInput.addEventListener("input", () => {
                    renderCodes(searchInput.value.trim());
                });
            }

            if (generateKeyBtn && localSupabase) {
                generateKeyBtn.addEventListener("click", async () => {
                    try {
                        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                        let key = "MDT-";
                        for (let i = 0; i < 16; i++) {
                            key += chars.charAt(Math.floor(Math.random() * chars.length));
                        }
                        const { error } = await localSupabase
                            .from("premium_keys")
                            .insert([{ key: key, used: false, created_at: new Date().toISOString() }]);
                        if (error) {
                            alert("Failed to generate premium key: " + error.message);
                            return;
                        }
                        if (keyInput) keyInput.value = key;
                        if (searchInput) renderCodes(searchInput.value.trim());
                    } catch (err) {
                        alert("An unexpected error occurred.");
                        console.error(err);
                    }
                });
            }

            if (copyKeyBtn && keyInput) {
                copyKeyBtn.addEventListener("click", async () => {
                    if (!keyInput.value) {
                        alert("Generate a key first.");
                        return;
                    }
                    try {
                        await navigator.clipboard.writeText(keyInput.value);
                        alert("Key copied to clipboard.");
                    } catch (err) {
                        alert("Failed to copy key.");
                    }
                });
            }
        }

        async function loadMasterActions() {
            const staff = await ensureStaff();
            if (!staff.allowed) return;
            if (staff.department !== "Management") {
                showStatus("Access denied. Management only.", "error");
                return;
            }
            pageTitle.textContent = "Master Actions";
            contentEl.innerHTML = `
                <div class="master-actions">
                    <h2>Master Actions</h2>
                    <p>Global controls for the PulseCAD website. Management only.</p>
                    <div class="master-row">
                        <div>
                            <div class="master-row-label">Development Mode</div>
                            <div class="master-row-sub">Enables development features across the website.</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="devModeToggle" />
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="master-row">
                        <div>
                            <div class="master-row-label">Restart Servers</div>
                            <div class="master-row-sub">Restart all PulseCAD servers globally.</div>
                        </div>
                        <button type="button" class="verified-btn" id="restartServersBtn">Restart</button>
                    </div>
                </div>
                <div class="master-actions" style="margin-top:20px;">
                    <h2>Management</h2>
                    <p>Ban and unban user emails from accessing PulseCAD.</p>
                    <div class="master-row">
                        <div>
                            <div class="master-row-label">Banned IDs</div>
                            <div class="master-row-sub">Manage banned email addresses.</div>
                        </div>
                        <button type="button" class="verified-btn" id="bannedIdsBtn" style="background:#dc2626;">Banned IDs</button>
                    </div>
                    <div class="master-row">
                        <div>
                            <div class="master-row-label">Support Panel</div>
                            <div class="master-row-sub">View and manage open support tickets.</div>
                        </div>
                        <button type="button" class="verified-btn" id="supportPanelBtn">Support Panel</button>
                    </div>
                </div>
            `;

            const devToggle = document.getElementById("devModeToggle");
            if (devToggle && localSupabase) {
                try {
                    const { data } = await localSupabase
                        .from("site_settings")
                        .select("value")
                        .eq("key", "dev_mode")
                        .maybeSingle();
                    devToggle.checked = !!(data && data.value === true);
                } catch (err) {
                    console.error("Could not load dev mode:", err);
                }
                devToggle.addEventListener("change", async () => {
                    try {
                        const { error } = await localSupabase
                            .from("site_settings")
                            .upsert({ key: "dev_mode", value: devToggle.checked }, { onConflict: "key" });
                        if (error) {
                            alert("Failed to update development mode: " + error.message);
                            devToggle.checked = !devToggle.checked;
                        }
                    } catch (err) {
                        console.error(err);
                    }
                });
            }

            const restartBtn = document.getElementById("restartServersBtn");
            if (restartBtn) {
                restartBtn.addEventListener("click", triggerRestart);
            }

            const bannedIdsBtn = document.getElementById("bannedIdsBtn");
            if (bannedIdsBtn) {
                bannedIdsBtn.addEventListener("click", loadBannedIds);
            }

            const supportPanelBtn = document.getElementById("supportPanelBtn");
            if (supportPanelBtn) {
                supportPanelBtn.addEventListener("click", () => {
                    window.open("support-panel.html", "_blank");
                });
            }
        }

        async function loadBannedIds() {
            const staff = await ensureStaff();
            if (!staff.allowed) return;
            pageTitle.textContent = "Banned IDs";
            contentEl.innerHTML = `
                <div class="codes-section">
                    <h2>Banned Email Addresses</h2>
                    <p>Ban an email address to prevent them from logging into PulseCAD.</p>
                    <div class="premium-key-display">
                        <input type="email" class="premium-key-input" id="banEmailInput" placeholder="Enter email to ban..." />
                        <button type="button" class="verified-btn" id="banEmailBtn" style="background:#dc2626;">Ban Email</button>
                    </div>
                </div>
                <div class="codes-list-section">
                    <h3>Banned Emails</h3>
                    <div class="codes-count" id="bannedCount"></div>
                    <table class="codes-list-table">
                        <tr><th>Email</th><th>Banned At</th><th>Actions</th></tr>
                        <tbody id="bannedListBody"><tr><td colspan="3"><div class="empty">Loading...</div></td></tr></tbody>
                    </table>
                </div>
            `;

            const banEmailInput = document.getElementById("banEmailInput");
            const banEmailBtn = document.getElementById("banEmailBtn");
            const bannedListBody = document.getElementById("bannedListBody");
            const bannedCount = document.getElementById("bannedCount");

            async function renderBanned() {
                if (!bannedListBody || !localSupabase) return;
                try {
                    const { data, error } = await localSupabase
                        .from("site_settings")
                        .select("value")
                        .eq("key", "banned_emails")
                        .maybeSingle();
                    let banned = [];
                    if (data && Array.isArray(data.value)) {
                        banned = data.value;
                    }
                    if (bannedCount) bannedCount.textContent = `${banned.length} banned email${banned.length === 1 ? '' : 's'}`;
                    if (banned.length === 0) {
                        bannedListBody.innerHTML = `<tr><td colspan="3"><div class="empty">No banned emails.</div></td></tr>`;
                        return;
                    }
                    bannedListBody.innerHTML = banned.map((item, index) => {
                        const email = (item.email || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const bannedAt = item.banned_at ? new Date(item.banned_at).toLocaleString() : "";
                        return `<tr><td>${email}</td><td>${bannedAt}</td><td><button type="button" class="delete-code-btn" data-index="${index}">Unban</button></td></tr>`;
                    }).join("");

                    bannedListBody.querySelectorAll(".delete-code-btn").forEach((btn) => {
                        btn.addEventListener("click", async () => {
                            const idx = parseInt(btn.getAttribute("data-index"), 10);
                            const newBanned = banned.filter((_, i) => i !== idx);
                            const { error } = await localSupabase
                                .from("site_settings")
                                .upsert({ key: "banned_emails", value: newBanned }, { onConflict: "key" });
                            if (error) {
                                alert("Failed to unban: " + error.message);
                                return;
                            }
                            renderBanned();
                        });
                    });
                } catch (err) {
                    bannedListBody.innerHTML = `<tr><td colspan="3"><div class="empty">An unexpected error occurred.</div></td></tr>`;
                    console.error(err);
                }
            }

            renderBanned();

            if (banEmailBtn && banEmailInput && localSupabase) {
                banEmailBtn.addEventListener("click", async () => {
                    const email = banEmailInput.value.trim();
                    if (!email) {
                        alert("Please enter an email to ban.");
                        return;
                    }
                    try {
                        const { data, error } = await localSupabase
                            .from("site_settings")
                            .select("value")
                            .eq("key", "banned_emails")
                            .maybeSingle();
                        let banned = [];
                        if (data && Array.isArray(data.value)) {
                            banned = data.value;
                        }
                        if (banned.some((item) => (item.email || "").toLowerCase() === email.toLowerCase())) {
                            alert("This email is already banned.");
                            return;
                        }
                        banned.push({ email: email, banned_at: new Date().toISOString() });
                        const { error: updateError } = await localSupabase
                            .from("site_settings")
                            .upsert({ key: "banned_emails", value: banned }, { onConflict: "key" });
                        if (updateError) {
                            alert("Failed to ban email: " + updateError.message);
                            return;
                        }
                        banEmailInput.value = "";
                        renderBanned();
                    } catch (err) {
                        alert("An unexpected error occurred.");
                        console.error(err);
                    }
                });
            }
        }

        function showApplicationForm() {
            pageTitle.textContent = "Customer Support Application";
            contentEl.innerHTML = `
                <form class="app-form">
                    <label>What is your Discord username and ID?</label>
                    <input type="text" />

                    <label>How old are you?</label>
                    <input type="text" />

                    <label>What time zone are you in?</label>
                    <input type="text" />

                    <label>How active can you be each week?</label>
                    <input type="text" />

                    <label>Have you been a member of our community before? If so, for how long?</label>
                    <input type="text" />

                    <button type="button" class="verified-btn" id="backAppBtn">Back</button>
                </form>
            `;

            const backAppBtn = document.getElementById("backAppBtn");

                backAppBtn.addEventListener("click", loadApplications);
            }
        }

        async function fetchJson(url, ms) {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), ms || 6000);
            try {
                const res = await fetch(url, { cache: "no-store", signal: ctrl.signal });
                clearTimeout(t);
                if (!res.ok) return null;
                return await res.json();
            } catch (e) {
                clearTimeout(t);
                return null;
            }
        }

        async function getClientIp() {
            const providers = [
                () => fetchJson("https://api.ipify.org?format=json").then((j) => j && j.ip),
                () => fetchJson("https://ipwho.is/").then((j) => j && j.success && j.ip),
                () => fetchJson("https://api.my-ip.io/ip").then((t) => (typeof t === "string" && t.trim()) ? t.trim() : null)
            ];
            for (const p of providers) {
                try {
                    const ip = await p();
                    if (ip) return ip;
                } catch (e) { /* try next */ }
            }
            return null;
        }

        async function captureMyIp() {
            if (!localSupabase) return;
            try {
                const { data: { user } } = await localSupabase.auth.getUser();
                if (!user) return;
                const ip = await getClientIp();
                if (ip) {
                    await localSupabase.from("users").update({ ip: ip }).eq("id", user.id);
                }
            } catch (e) { /* ignore */ }
        }

        captureMyIp();
        loadServers();

        async function triggerRestart() {
            if (!confirm("Are you sure you want to restart all servers? This will temporarily make the site unavailable.")) {
                return;
            }
            location.reload();
        }
    </script>
