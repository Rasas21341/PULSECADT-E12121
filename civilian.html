<!DOCTYPE html>
<html lang="en">
<head>

    <title>Create Civilian - PulseCAD</title>
    <style>
        * {

        body {

     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        let localSupabase = null;
        let currentUserId = null;
        let currentCivilianId = null;
        let selectedCivilianId = null;

        try {
            if (typeof window.supabase !== "undefined") {
                localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (err) {
            console.error("Supabase init failed:", err);
        }

        async function getCurrentUser() {
            if (!localSupabase) return null;
            try {
                const { data: { user } } = await localSupabase.auth.getUser();
                return user;
            } catch (err) {
                console.error("Auth check failed:", err);
                return null;
            }
        }

        async function loadMyCivilians() {
            const listEl = document.getElementById("myCiviliansList");
            const sectionEl = document.getElementById("myCiviliansSection");

            if (!localSupabase || !listEl) {
                if (listEl) listEl.innerHTML = '<div class="empty-state">Database not loaded. Check console for errors.</div>';
                return;
            }

            try {
                const { data, error } = await localSupabase
                    .from("civilians")
                    .select("*")
                    .order("created_at", { ascending: false });

                if (error) {
                    listEl.innerHTML = `<div class="empty-state">Error loading civilians: ${escapeHtml(error.message)}</div>`;
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    listEl.innerHTML = '<div class="empty-state">No civilians created yet.</div>';
                    return;
                }

                listEl.innerHTML = "";
                for (const civilian of data) {
                    const card = document.createElement("div");
                    card.className = "civilian-card";
                    card.setAttribute("data-id", civilian.id);

                    const meta = [civilian.age, civilian.gender, civilian.address].filter(Boolean).join(" | ") || "No additional details";

                    card.innerHTML = `
                        <div class="civilian-card-name">${escapeHtml(civilian.name)}</div>
                        <div class="civilian-card-meta">${escapeHtml(meta)}</div>
                        ${civilian.photo_url ? `<img src="${escapeHtml(civilian.photo_url)}" style="max-width: 80px; max-height: 80px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 8px; display: block;" />` : ""}
                        <div class="license-list" id="licenseList-${civilian.id}"></div>
                    `;

                    card.addEventListener("click", (e) => {
                        selectCivilianCard(civilian.id, card);
                    });

                    listEl.appendChild(card);

                    loadLicenses(civilian.id);
                }
            } catch (err) {
                console.error("Failed to load civilians:", err);
                if (listEl) listEl.innerHTML = '<div class="empty-state">Failed to load civilians.</div>';
            }
        }

        function selectCivilianCard(civilianId, cardElement) {
            selectedCivilianId = civilianId;
            currentCivilianId = civilianId;

            document.querySelectorAll(".civilian-card").forEach((c) => c.classList.remove("selected"));
            if (cardElement) cardElement.classList.add("selected");

            const sectionEditBtn = document.getElementById("sectionEditBtn");
            const sectionLicenseBtn = document.getElementById("sectionLicenseBtn");
            const sectionDeleteBtn = document.getElementById("sectionDeleteBtn");
            if (sectionEditBtn) sectionEditBtn.disabled = false;
            if (sectionLicenseBtn) sectionLicenseBtn.disabled = false;
            if (sectionDeleteBtn) sectionDeleteBtn.disabled = false;
        }

        async function loadLicenses(civilianId) {
            const listEl = document.getElementById(`licenseList-${civilianId}`);
            if (!listEl || !localSupabase) return;

            try {
                const { data, error } = await localSupabase
                    .from("licenses")
                    .select("*")
                    .eq("civilian_id", civilianId)
                    .order("created_at", { ascending: false });

                if (error || !Array.isArray(data) || data.length === 0) {
                    listEl.innerHTML = "";
                    return;
                }

                listEl.innerHTML = data.map((lic) => `
                    <div class="license-item">
                        <strong>${escapeHtml(lic.license_type)}</strong> — ${escapeHtml(lic.license_number || "No number")}
                        ${lic.expiry_date ? `<br>Expires: ${escapeHtml(lic.expiry_date)}` : ""}
                        <button type="button" class="license-download-btn" data-id="${lic.id}" data-type="${escapeHtml(lic.license_type)}" data-number="${escapeHtml(lic.license_number || "")}" data-expiry="${escapeHtml(lic.expiry_date || "")}">View License</button>
                    </div>
                `).join("");

                listEl.querySelectorAll(".license-download-btn").forEach((btn) => {
                    btn.addEventListener("click", () => {
                        openLicenseCard({
                            type: btn.getAttribute("data-type"),
                            number: btn.getAttribute("data-number"),
                            expiry: btn.getAttribute("data-expiry")
                        });
                    });
                });
            } catch (err) {
                console.error("Failed to load licenses:", err);
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        const editModal = document.getElementById("editCivilianModal");
        const editModalClose = document.getElementById("editModalClose");
        const editSubmitBtn = document.getElementById("editCivilianSubmitBtn");
        const editError = document.getElementById("editCivilianError");
        const editSuccess = document.getElementById("editCivilianSuccess");
        const editPhotoInput = document.getElementById("editCivilianPhoto");
        const editPhotoPreview = document.getElementById("editCivilianPhotoPreview");
        let currentEditCivilianId = null;
        let currentEditPhotoBase64 = null;

        if (editModalClose) {
            editModalClose.addEventListener("click", () => {
                if (editModal) editModal.classList.remove("open");
            });
        }

        if (editModal) {
            editModal.addEventListener("click", (e) => {
                if (e.target === editModal) {
                    editModal.classList.remove("open");
                }
            });
        }

        if (editPhotoInput) {
            editPhotoInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) {
                    if (editPhotoPreview) editPhotoPreview.style.display = "none";
                    currentEditPhotoBase64 = null;
                    return;
                }
                if (!file.type.startsWith("image/")) {
                    if (editError) { editError.textContent = "Please select an image file."; editError.style.display = "block"; }
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentEditPhotoBase64 = ev.target.result;
                    if (editPhotoPreview) {
                        editPhotoPreview.src = currentEditPhotoBase64;
                        editPhotoPreview.style.display = "block";
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        async function openEditModal(civilianId) {
            if (!editModal || !localSupabase) return;
            currentEditCivilianId = civilianId;
            currentEditPhotoBase64 = null;
            if (editError) { editError.textContent = ""; editError.style.display = "none"; }
            if (editSuccess) { editSuccess.textContent = ""; editSuccess.style.display = "none"; }
            if (editPhotoPreview) editPhotoPreview.style.display = "none";
            if (editPhotoInput) editPhotoInput.value = "";

                try {
                    const { data, error } = await localSupabase
                        .from("civilians")
                        .select("*")
                        .eq("id", civilianId)
                        .maybeSingle();

                    if (error || !data) {
                        if (editError) { editError.textContent = "Failed to load civilian."; editError.style.display = "block"; }
                        return;
                    }

                    document.getElementById("editCivilianName").value = data.name || "";
                    document.getElementById("editCivilianAge").value = data.age || "";
                    document.getElementById("editCivilianGender").value = data.gender || "";
                    document.getElementById("editCivilianAddress").value = data.address || "";
                    document.getElementById("editCivilianNotes").value = data.notes || "";

                    const photoUrl = data.photo_url || data.photo || "";
                    if (photoUrl && editPhotoPreview) {
                        editPhotoPreview.src = photoUrl;
                        editPhotoPreview.style.display = "block";
                        currentEditPhotoBase64 = photoUrl;
                    } else {
                        if (editPhotoPreview) editPhotoPreview.style.display = "none";
                        currentEditPhotoBase64 = null;
                    }

                editModal.classList.add("open");
            } catch (err) {
                console.error("Failed to load civilian for edit:", err);
                if (editError) { editError.textContent = "Failed to load civilian."; editError.style.display = "block"; }
            }
        }

        if (editSubmitBtn) {
            editSubmitBtn.addEventListener("click", async () => {
                if (!currentEditCivilianId) {
                    if (editError) { editError.textContent = "No civilian selected."; editError.style.display = "block"; }
                    return;
                }

                const name = document.getElementById("editCivilianName")?.value.trim() || "";
                const age = document.getElementById("editCivilianAge")?.value.trim() || "";
                const gender = document.getElementById("editCivilianGender")?.value || "";
                const address = document.getElementById("editCivilianAddress")?.value.trim() || "";
                const notes = document.getElementById("editCivilianNotes")?.value.trim() || "";

                if (!name) {
                    if (editError) { editError.textContent = "Name is required."; editError.style.display = "block"; }
                    return;
                }

                if (!localSupabase) {
                    if (editError) { editError.textContent = "Database unavailable."; editError.style.display = "block"; }
                    return;
                }

                if (editError) { editError.textContent = ""; editError.style.display = "none"; }
                if (editSuccess) { editSuccess.textContent = ""; editSuccess.style.display = "none"; }

                try {
                    const payload = {
                        name,
                        age: age ? parseInt(age, 10) : null,
                        gender: gender || null,
                        address: address || null,
                        notes: notes || null,
                    };
                    if (currentEditPhotoBase64 !== null) {
                        payload.photo_url = currentEditPhotoBase64;
                    }

                    const { error } = await localSupabase
                        .from("civilians")
                        .update(payload)
                        .eq("id", currentEditCivilianId);

                    if (error) {
                        if (editError) { editError.textContent = error.message || "Failed to update civilian."; editError.style.display = "block"; }
                        console.error("Update failed:", error);
                        return;
                    }

                    if (editSuccess) { editSuccess.textContent = "Civilian updated successfully."; editSuccess.style.display = "block"; }

                    setTimeout(() => {
                        if (editModal) editModal.classList.remove("open");
                        loadMyCivilians();
                    }, 600);
                } catch (err) {
                    if (editError) { editError.textContent = "Failed to update civilian."; editError.style.display = "block"; }
                    console.error(err);
                }
            });
        }

        // licenseCard is declared earlier; avoid redeclaration here
        const lcTitle = document.getElementById("lcTitle");
        const lcBody = document.getElementById("lcBody");
        const lcStatus = document.getElementById("lcStatus");
        const lcPrintBtn = document.getElementById("lcPrintBtn");
        const lcCloseBtn = document.getElementById("lcCloseBtn");

        function openLicenseCard({ type, number, expiry }) {
            if (!licenseCard) return;
            if (lcTitle) lcTitle.textContent = type || "LICENSE";
            if (lcStatus) {
                lcStatus.textContent = expiry && new Date(expiry) < new Date() ? "Expired" : "Active";
                lcStatus.style.background = expiry && new Date(expiry) < new Date() ? "#fef2f2" : "#f0fdf4";
                lcStatus.style.color = expiry && new Date(expiry) < new Date() ? "#991b1b" : "#166534";
                lcStatus.style.borderColor = expiry && new Date(expiry) < new Date() ? "#fecaca" : "#bbf7d0";
            }
            const issueDate = new Date().toLocaleDateString();
            if (lcBody) {
                lcBody.innerHTML = `
                    <div class="license-card-row">
                        <span class="license-card-label">License Type</span>
                        <span class="license-card-value">${escapeHtml(type)}</span>
                    </div>
                    <div class="license-card-row">
                        <span class="license-card-label">License Number</span>
                        <span class="license-card-value">${escapeHtml(number || "N/A")}</span>
                    </div>
                    <div class="license-card-row">
                        <span class="license-card-label">Issued Date</span>
                        <span class="license-card-value">${issueDate}</span>
                    </div>
                    <div class="license-card-row">
                        <span class="license-card-label">Expiry Date</span>
                        <span class="license-card-value">${expiry ? escapeHtml(expiry) : "N/A"}</span>
                    </div>
                `;
            }
            licenseCard.classList.add("open");
        }

        if (lcCloseBtn) {
            lcCloseBtn.addEventListener("click", () => {
                if (licenseCard) licenseCard.classList.remove("open");
            });
        }

        if (lcPrintBtn) {
            lcPrintBtn.addEventListener("click", () => {
                window.print();
            });
        }

        const licenseModal = document.getElementById("licenseModal");
        const licenseModalClose = document.getElementById("licenseModalClose");
        const licenseSubmitBtn = document.getElementById("licenseSubmitBtn");
        const licenseError = document.getElementById("licenseError");
        const licenseSuccess = document.getElementById("licenseSuccess");

        if (licenseModalClose) {
            licenseModalClose.addEventListener("click", () => {
                if (licenseModal) licenseModal.classList.remove("open");
            });
        }

        if (licenseModal) {
            licenseModal.addEventListener("click", (e) => {
                if (e.target === licenseModal) {
                    licenseModal.classList.remove("open");
                }
            });
        }

        function openLicenseModal() {
            if (!licenseModal) return;
            if (licenseError) { licenseError.textContent = ""; licenseError.style.display = "none"; }
            if (licenseSuccess) { licenseSuccess.textContent = ""; licenseSuccess.style.display = "none"; }
            licenseModal.classList.add("open");
        }

        function generateLicenseNumber(type) {
            const prefixMap = {
                "Driver's License": "DL",
                "Weapon License": "WL",
                "Fishing License": "FL",
                "Boating License": "BL",
                "Other": "LIC"
            };
            const prefix = prefixMap[type] || "LIC";
            const random = Math.floor(100000 + Math.random() * 900000);
            return `${prefix}-${random}`;
        }

        const licenseTypeSelect = document.getElementById("licenseType");
        const licenseNumberInput = document.getElementById("licenseNumber");
        if (licenseTypeSelect && licenseNumberInput) {
            licenseTypeSelect.addEventListener("change", () => {
                if (licenseTypeSelect.value) {
                    licenseNumberInput.value = generateLicenseNumber(licenseTypeSelect.value);
                } else {
                    licenseNumberInput.value = "";
                }
            });
        }

        if (licenseSubmitBtn) {
            licenseSubmitBtn.addEventListener("click", async () => {
                if (!currentCivilianId) {
                    if (licenseError) { licenseError.textContent = "No civilian selected."; licenseError.style.display = "block"; }
                    return;
                }

                const user = await getCurrentUser();
                if (!user) {
                    if (licenseError) { licenseError.textContent = "You must be logged in."; licenseError.style.display = "block"; }
                    return;
                }

                const licenseType = document.getElementById("licenseType")?.value || "";
                const licenseNumber = document.getElementById("licenseNumber")?.value.trim() || "";
                const licenseExpiry = document.getElementById("licenseExpiry")?.value || "";

                if (!licenseType) {
                    if (licenseError) { licenseError.textContent = "Select a license type."; licenseError.style.display = "block"; }
                    return;
                }

                if (!localSupabase) {
                    if (licenseError) { licenseError.textContent = "Database unavailable."; licenseError.style.display = "block"; }
                    return;
                }

                if (licenseError) { licenseError.textContent = ""; licenseError.style.display = "none"; }
                if (licenseSuccess) { licenseSuccess.textContent = ""; licenseSuccess.style.display = "none"; }

                try {
                    const { error } = await localSupabase
                        .from("licenses")
                        .insert([{
                            civilian_id: currentCivilianId,
                            user_id: user.id,
                            license_type: licenseType,
                            license_number: licenseNumber || null,
                            expiry_date: licenseExpiry || null,
                            created_at: new Date().toISOString()
                        }]);

                    if (error) {
                        if (licenseError) { licenseError.textContent = error.message || "Failed to create license."; licenseError.style.display = "block"; }
                        console.error("License insert failed:", error);
                        return;
                    }

                    if (licenseSuccess) { licenseSuccess.textContent = "License created successfully."; licenseSuccess.style.display = "block"; }

                    document.getElementById("licenseType").value = "";
                    document.getElementById("licenseNumber").value = "";
                    document.getElementById("licenseExpiry").value = "";

                    loadLicenses(currentCivilianId);

                    setTimeout(() => {
                        if (licenseModal) licenseModal.classList.remove("open");
                    }, 800);
                } catch (err) {
                    if (licenseError) { licenseError.textContent = "Failed to create license."; licenseError.style.display = "block"; }
                    console.error(err);
                }
            });
        }

        document.getElementById("backBtn").addEventListener("click", () => history.back());

        const form = document.getElementById("createCivilianForm");
        const formError = document.getElementById("formError");
        const formSuccess = document.getElementById("formSuccess");
        const civilianPhotoInput = document.getElementById("civilianPhoto");
        const civilianPhotoPreview = document.getElementById("civilianPhotoPreview");
        let createPhotoBase64 = null;

        if (civilianPhotoInput) {
            civilianPhotoInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) {
                    if (civilianPhotoPreview) civilianPhotoPreview.style.display = "none";
                    createPhotoBase64 = null;
                    return;
                }
                if (!file.type.startsWith("image/")) {
                    if (formError) { formError.textContent = "Please select an image file."; formError.style.display = "block"; }
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    createPhotoBase64 = ev.target.result;
                    if (civilianPhotoPreview) {
                        civilianPhotoPreview.src = createPhotoBase64;
                        civilianPhotoPreview.style.display = "block";
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                if (formError) { formError.textContent = ""; formError.style.display = "none"; }
                if (formSuccess) { formSuccess.textContent = ""; formSuccess.style.display = "none"; }

                const name = document.getElementById("civilianName")?.value.trim() || "";
                const age = document.getElementById("civilianAge")?.value.trim() || "";
                const gender = document.getElementById("civilianGender")?.value || "";
                const address = document.getElementById("civilianAddress")?.value.trim() || "";
                const notes = document.getElementById("civilianNotes")?.value.trim() || "";

                if (!name) {
                    if (formError) { formError.textContent = "Name is required."; formError.style.display = "block"; }
                    return;
                }

                if (!localSupabase) {
                    if (formError) { formError.textContent = "Database unavailable."; formError.style.display = "block"; }
                    return;
                }

                try {
                    const user = await getCurrentUser();
                    const payload = {
                        name,
                        age: age ? parseInt(age, 10) : null,
                        gender: gender || null,
                        address: address || null,
                        notes: notes || null,
                        created_at: new Date().toISOString()
                    };
                    if (user) {
                        payload.user_id = user.id;
                    }
                    if (createPhotoBase64) {
                        payload.photo_url = createPhotoBase64;
                    }

                    const { error } = await localSupabase
                        .from("civilians")
                        .insert([payload]);

                    if (error) {
                        if (formError) {
                            formError.textContent = error.message || "Failed to save civilian.";
                            formError.style.display = "block";
                        }
                        console.error("Insert failed:", error);
                        return;
                    }

                    if (formSuccess) {
                        formSuccess.textContent = "Civilian created successfully.";
                        formSuccess.style.display = "block";
                    }
                    form.reset();
                    createPhotoBase64 = null;
                    if (civilianPhotoPreview) civilianPhotoPreview.style.display = "none";
                    loadMyCivilians();
                } catch (err) {
                    if (formError) { formError.textContent = "Failed to create civilian."; formError.style.display = "block"; }
                    console.error(err);
                }
            });
        }

        const sectionEditBtn = document.getElementById("sectionEditBtn");
        const sectionLicenseBtn = document.getElementById("sectionLicenseBtn");

        if (sectionEditBtn) {
            sectionEditBtn.addEventListener("click", () => {
                if (!selectedCivilianId) {
                    alert("Select a civilian first by clicking on their card.");
                    return;
                }
                openEditModal(selectedCivilianId);
            });
        }

        if (sectionLicenseBtn) {
            sectionLicenseBtn.addEventListener("click", () => {
                if (!selectedCivilianId) {
                    alert("Select a civilian first by clicking on their card.");
                    return;
                }
                currentCivilianId = selectedCivilianId;
                openLicenseModal();
            });
        }

        const sectionDeleteBtn = document.getElementById("sectionDeleteBtn");
        if (sectionDeleteBtn) {
            sectionDeleteBtn.addEventListener("click", async () => {
                if (!selectedCivilianId) {
                    alert("Select a civilian first by clicking on their card.");
                    return;
                }
                if (!confirm("Delete this civilian and all associated licenses?")) return;
                if (!localSupabase) return;
                try {
                    await localSupabase.from("licenses").delete().eq("civilian_id", selectedCivilianId);
                    await localSupabase.from("civilians").delete().eq("id", selectedCivilianId);
                    selectedCivilianId = null;
                    document.querySelectorAll(".civilian-card").forEach((c) => c.classList.remove("selected"));
                    if (sectionEditBtn) sectionEditBtn.disabled = true;
                    if (sectionLicenseBtn) sectionLicenseBtn.disabled = true;
                    if (sectionDeleteBtn) sectionDeleteBtn.disabled = true;
                    loadMyCivilians();
                } catch (err) {
                    console.error("Delete failed:", err);
                    alert("Failed to delete civilian.");
                }
            });
        }

        loadMyCivilians();

        document.querySelectorAll(".modal-overlay").forEach((overlay) => {
            overlay.classList.remove("open");
        });
        const licenseCard = document.getElementById("licenseCard");
        if (licenseCard) licenseCard.classList.remove("open");
    </script>
</body>
</html>
